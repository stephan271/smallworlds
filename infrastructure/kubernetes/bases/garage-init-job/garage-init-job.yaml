apiVersion: batch/v1
kind: Job
metadata:
  name: garage-init
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "-2"
spec:
  template:
    spec:
      serviceAccountName: setup-sa
      containers:
        - name: setup
          image: bitnami/kubectl:1.30.2
          command:
            - /bin/bash
            - -c
            - |
              set -e
              
              TENANT_NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)

              echo "Waiting for Garage pod to be ready..."
              until kubectl get pods -n garage-system -l app.kubernetes.io/name=garage -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null | grep -q 'true'; do
                echo "Garage is not ready yet, waiting..."
                sleep 5
              done

              echo "Finding Garage pod..."
              POD=$(kubectl get pods -n garage-system -l app.kubernetes.io/name=garage -o name | head -n 1)

              echo "Forming Garage Storage Layout..."
              NODES=$(kubectl exec -n garage-system $POD -- /garage status | grep -E '^[0-9a-f]{16}' | awk '{print $1}')
              for NODE in $NODES; do
                echo "Staging layout assignment for $NODE..."
                kubectl exec -n garage-system $POD -- /garage layout assign -z dc1 -c 100G $NODE || true
              done
              
              echo "Applying layout revision..."
              kubectl exec -n garage-system $POD -- /garage layout apply --version 1 || true

              # --- Tenant key & bucket ---
              if kubectl get secret garage-secret -n $TENANT_NAMESPACE > /dev/null 2>&1; then
                echo "garage-secret already exists in $TENANT_NAMESPACE namespace, skipping key creation."
              else
                echo "Deleting existing Garage key if any (for idempotent re-runs)..."
                kubectl exec -n garage-system $POD -- /garage key delete --yes ${TENANT_NAMESPACE}-key || true

                echo "Generating access key for $TENANT_NAMESPACE..."
                OUTPUT=$(kubectl exec -n garage-system $POD -- /garage key create ${TENANT_NAMESPACE}-key)
                
                ACCESS_KEY=$(echo "$OUTPUT" | grep "Key ID:" | awk '{print $3}')
                SECRET_KEY=$(echo "$OUTPUT" | grep "Secret key:" | awk '{print $3}')

                if [[ -z "$ACCESS_KEY" || -z "$SECRET_KEY" ]]; then
                  echo "Error: Failed to parse Key ID or Secret key from output."
                  exit 1
                fi

                echo "Setting permissions for $TENANT_NAMESPACE key..."
                kubectl exec -n garage-system $POD -- /garage key allow ${TENANT_NAMESPACE}-key --create-bucket || true

                echo "Creating $TENANT_NAMESPACE bucket..."
                kubectl exec -n garage-system $POD -- /garage bucket create $TENANT_NAMESPACE || true
                kubectl exec -n garage-system $POD -- /garage bucket allow $TENANT_NAMESPACE --read --write --owner --key ${TENANT_NAMESPACE}-key || true

                echo "Creating garage-secret in $TENANT_NAMESPACE namespace..."
                kubectl create secret generic garage-secret -n $TENANT_NAMESPACE \
                  --from-literal=accessKey="$ACCESS_KEY" \
                  --from-literal=secretKey="$SECRET_KEY" \
                  --from-literal=accessKeyId="$ACCESS_KEY" \
                  --from-literal=secretAccessKey="$SECRET_KEY"
              fi

              # --- Dedicated CNPG key ---
              echo "Setting up dedicated postgres-backups key for CNPG..."
              kubectl exec -n garage-system $POD -- /garage key delete --yes ${TENANT_NAMESPACE}-cnpg-key || true
              CNPG_OUTPUT=$(kubectl exec -n garage-system $POD -- /garage key create ${TENANT_NAMESPACE}-cnpg-key)
              CNPG_ACCESS=$(echo "$CNPG_OUTPUT" | grep "Key ID:" | awk '{print $3}')
              CNPG_SECRET=$(echo "$CNPG_OUTPUT" | grep "Secret key:" | awk '{print $3}')

              kubectl exec -n garage-system $POD -- /garage key allow ${TENANT_NAMESPACE}-cnpg-key --create-bucket || true

              echo "Creating global postgres-backups bucket..."
              kubectl exec -n garage-system $POD -- /garage bucket create postgres-backups || true
              kubectl exec -n garage-system $POD -- /garage bucket allow postgres-backups --read --write --owner --key ${TENANT_NAMESPACE}-cnpg-key || true

              echo "Creating garage-secret-cnpg in $TENANT_NAMESPACE namespace..."
              kubectl create secret generic garage-secret-cnpg -n $TENANT_NAMESPACE \
                --from-literal=accessKeyId="$CNPG_ACCESS" \
                --from-literal=secretAccessKey="$CNPG_SECRET" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Garage initialized successfully for $TENANT_NAMESPACE!"
      restartPolicy: OnFailure
