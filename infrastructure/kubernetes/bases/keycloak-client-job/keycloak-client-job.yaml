apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-client-init
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: setup-sa
      containers:
        - name: setup
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              TENANT_NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)

              if kubectl get secret keycloak-secret -n $TENANT_NAMESPACE >/dev/null 2>&1; then
                echo "keycloak-secret already exists, skipping."
                exit 0
              fi

              if [[ -z "$REDIRECT_URIS" ]]; then
                echo "Error: REDIRECT_URIS environment variable is required."
                exit 1
              fi

              echo "Finding Keycloak pod..."
              POD=keycloak-keycloakx-0

              echo "Waiting for Keycloak pod to be fully ready..."
              while ! kubectl get pods -n keycloak $POD -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null | grep -q 'true'; do
                echo "Keycloak is not ready yet, waiting..."
                sleep 5
              done
              echo "Keycloak is ready!"

              echo "Retrieving Keycloak admin password..."
              PASSWORD=$(kubectl get secret keycloak-admin-creds -n keycloak -o jsonpath="{.data.admin-password}" | base64 -d)

              echo "Authenticating into Keycloak..."
              kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh config credentials --server http://localhost:8080 --realm master --user admin --password "$PASSWORD"

              echo "Checking if client exists..."
              EXISTS=$(kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh get clients -r smallworlds -q clientId=$TENANT_NAMESPACE)
              
              if [[ "$EXISTS" == "[]" || "$EXISTS" == "[ ]" || -z "$EXISTS" ]]; then
                echo "Creating $TENANT_NAMESPACE client with redirect URIs: $REDIRECT_URIS"
                kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh create clients -r smallworlds -s clientId=$TENANT_NAMESPACE -s enabled=true -s publicClient=false -s standardFlowEnabled=true -s "redirectUris=$REDIRECT_URIS" -s 'webOrigins=["+"]'
              else
                echo "Client already exists."
              fi

              if [[ -n "$OIDC_AUDIENCE_MAPPER" ]]; then
                echo "Ensuring Audience Protocol Mapper exists for: $OIDC_AUDIENCE_MAPPER"
                CLIENT_ID=$(kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh get clients -r smallworlds -q clientId=$TENANT_NAMESPACE --fields id | grep '"id"' | cut -d'"' -f4)
                kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh create clients/$CLIENT_ID/protocol-mappers/models -r smallworlds \
                  -s name="aud-$OIDC_AUDIENCE_MAPPER" \
                  -s protocol="openid-connect" \
                  -s protocolMapper="oidc-audience-mapper" \
                  -s consentRequired=false \
                  -s 'config."included.custom.audience"="'$OIDC_AUDIENCE_MAPPER'"' \
                  -s 'config."id.token.claim"="false"' \
                  -s 'config."access.token.claim"="true"' || echo "Audience mapper already exists or failed to create."
              fi

              echo "Extracting Client Secret..."
              SECRET=$(kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh get clients -r smallworlds -q clientId=$TENANT_NAMESPACE --fields secret | grep "secret" | cut -d'"' -f4)

              if [[ -z "$SECRET" ]]; then
                echo "Error: Failed to retrieve OIDC Client Secret."
                exit 1
              fi

              echo "Creating keycloak-secret in $TENANT_NAMESPACE namespace..."
              kubectl create secret generic keycloak-secret -n $TENANT_NAMESPACE \
                --from-literal=clientId=$TENANT_NAMESPACE \
                --from-literal=client-secret="$SECRET"

              echo "Keycloak integration setup complete for $TENANT_NAMESPACE!"
      restartPolicy: OnFailure
