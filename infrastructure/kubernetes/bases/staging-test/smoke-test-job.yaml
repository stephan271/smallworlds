apiVersion: batch/v1
kind: Job
metadata:
  name: staging-smoke-test
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: test-runner
          image: curlimages/curl:8.4.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for service to become ready..."
              # Service name should be passed via env or just assume it matches the namespace
              TARGET_URL=${TARGET_URL:-"http://${SERVICE_NAME}.${NAMESPACE}.svc.cluster.local:${SERVICE_PORT:-80}/healthz"}
              
              MAX_RETRIES=30
              RETRY_INTERVAL=10
              count=0
              
              while [ $count -lt $MAX_RETRIES ]; do
                status_code=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET_URL")
                if [ "$status_code" -eq 200 ] || [ "$status_code" -eq 301 ] || [ "$status_code" -eq 302 ]; then
                  echo "Smoke test passed! Service responded with $status_code."
                  exit 0
                fi
                echo "Attempt $((count + 1))/$MAX_RETRIES: Service returned $status_code. Retrying in $RETRY_INTERVAL seconds..."
                sleep $RETRY_INTERVAL
                count=$((count + 1))
              done
              
              echo "Smoke test failed! Service did not become ready."
              exit 1
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: "REPLACE_ME_IN_PATCH"
            - name: SERVICE_PORT
              value: "80"
