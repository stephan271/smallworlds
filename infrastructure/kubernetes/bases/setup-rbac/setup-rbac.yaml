apiVersion: v1
kind: ServiceAccount
metadata:
  name: setup-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: setup-binding
subjects:
  - kind: ServiceAccount
    name: setup-sa
roleRef:
  kind: ClusterRole
  name: tenant-setup-role
  apiGroup: rbac.authorization.k8s.io
