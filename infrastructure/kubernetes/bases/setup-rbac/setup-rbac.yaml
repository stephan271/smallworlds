# Plain resources, NOT hooks: PreSync hooks are deleted and recreated on
# every sync attempt (BeforeHookCreation default), which yanks the
# ServiceAccount away from still-running init jobs of the previous attempt.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: setup-sa
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: setup-binding
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: setup-sa
roleRef:
  kind: ClusterRole
  name: tenant-setup-role
  apiGroup: rbac.authorization.k8s.io
