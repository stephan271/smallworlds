apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dashboard
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/stephan271/smallworlds.git'
    targetRevision: HEAD
    path: 00-letsgo/infrastructure/kubernetes/tenants/dashboard
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
