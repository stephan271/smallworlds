apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: auto-remediator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://robusta-charts.storage.googleapis.com'
    # 0.11+ requires at least one entry in sinksConfig (breaking values change);
    # 0.10.33-0.10.35 were yanked from the chart repo, 0.10.32 is the last 0.10.x
    targetRevision: "0.10.32"
    chart: robusta
    helm:
      values: |
        clusterName: "smallworlds-cluster"
        isSmallCluster: true
        disableCloudRouting: true # Keep metrics locally inside the sovereign cloud
        playbooks:
          - name: "OOMKill Auto-Remediation"
            triggers:
              - on_prometheus_alert:
                  alert_name: KubePodCrashLooping
            actions:
              - pod_oom_killer_enricher: {}
        # Note: In a production setup, more specific playbooks (like HPA tuning or CNPG failover) 
        # would be configured here using Robusta's custom actions or standard K8s HPA/VPA resources.
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
