apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: smallworlds-alerts
  namespace: monitoring
  labels:
    # Matched by kube-prometheus-stack's alertmanagerConfigSelector.
    alertmanagerConfig: smallworlds
  annotations:
    # Apply after the kube-prometheus-stack CRDs exist (fresh-install ordering;
    # ArgoCD retries anyway if the CRD isn't ready yet).
    argocd.argoproj.io/sync-wave: "1"
spec:
  route:
    receiver: email-admin
    groupBy: ["alertname", "namespace"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    routes:
      # The kube-prometheus-stack deadman's-switch alert fires constantly by
      # design — discard it instead of emailing.
      - receiver: blackhole
        matchers:
          - name: alertname
            value: Watchdog
      # Tier 1 remediation: hand KubePodCrashLooping to the deterministic
      # handler service (which confirms OOMKilled and opens a right-sizing PR).
      # continue: true so the very next route still emails it — the operator
      # keeps full visibility while Tier 1 is in DRY_RUN. Once armed, this
      # duplicate email route can be dropped so handled alerts stop paging.
      - receiver: tier1-webhook
        continue: true
        matchers:
          - name: alertname
            value: KubePodCrashLooping
      - receiver: email-admin
        matchers:
          - name: alertname
            value: KubePodCrashLooping
  receivers:
    - name: email-admin
      emailConfigs:
        # Placeholder recipient. Each operator overrides this in their private
        # overlay (my-community-config) via a kustomize patch on this CR:
        #   /spec/receivers/0/emailConfigs/0/to
        - to: alerts@example.com
          from: alertmanager@smallworlds.network
          # EHLO identity — must be a valid FQDN or Stalwart rejects it with
          # "550 Invalid EHLO domain" (Alertmanager otherwise sends "localhost").
          hello: smallworlds.network
          # Stalwart's internal relay accepts unauthenticated mail from cluster
          # subnets (10.42/10.43) and DKIM-signs local-domain senders; plain
          # in-cluster port 25, no TLS needed.
          smarthost: stalwart-mail.stalwart.svc.cluster.local:25
          requireTLS: false
          sendResolved: true
    - name: blackhole
    - name: tier1-webhook
      webhookConfigs:
        - url: http://remediation.remediation.svc.cluster.local:8080/webhook
          sendResolved: true
