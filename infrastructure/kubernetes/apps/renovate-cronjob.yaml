apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: argocd
spec:
  schedule: "0 * * * *" # Runs every hour
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: renovate/renovate:43@sha256:e5c59392e4fc8279e2034773f356c06e0a5ffc0c5ad97ab9c2edc1d9944fb9af
              env:
                - name: LOG_LEVEL
                  value: debug
                - name: RENOVATE_PLATFORM
                  value: github
                - name: RENOVATE_AUTODISCOVER
                  value: "false"
                - name: RENOVATE_REPOSITORIES
                  value: "stephan271/smallworlds"
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: repo-git-creds
                      key: password
          restartPolicy: Never
