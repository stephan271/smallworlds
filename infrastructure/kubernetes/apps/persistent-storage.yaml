# ------------------------------------------------------------------------------
# StorageClass: static-local
# Static (no-provisioner) binding for PVs on the persistent data mount at
# /mnt/smallworlds-data — a Hetzner network volume on the cloud target, a
# symlinked local directory on the LAN target. The path is created by the
# bootstrap provisioner and survives VM re-creation / reinstall.
# ------------------------------------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: static-local
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
provisioner: kubernetes.io/no-provisioner  # manual / static provisioning
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
# PersistentVolume for Garage S3 storage
# Garage's Helm chart PVC will bind to this when using storageClassName: static-local
apiVersion: v1
kind: PersistentVolume
metadata:
  name: garage-data-pv
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  capacity:
    storage: 120Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: static-local
  local:
    path: /mnt/smallworlds-data/garage
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                # Both provisioning targets: Hetzner VM (cloud-init) and
                # local server (bootstrap-local-node.sh)
                - cc-pilot-node-01
                - smallworlds-local-node
---
# PersistentVolume for Immich photo library
# The immich-library-pvc will bind to this by name.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library-pv
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  capacity:
    storage: 60Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: static-local
  volumeMode: Filesystem
  local:
    path: /mnt/smallworlds-data/immich-library
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                # Both provisioning targets: Hetzner VM (cloud-init) and
                # local server (bootstrap-local-node.sh)
                - cc-pilot-node-01
                - smallworlds-local-node
