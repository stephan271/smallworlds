apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This is the master base for SmallWorlds communities.
# It includes the core backend components (via ArgoCD App CRDs) 
# and the user-facing tenants (via Kustomize bases) so they can be easily patched.
resources:
  - namespaces.yaml

  # 1. Backend Components (Installed as ArgoCD Apps)
  - apps/cert-manager.yaml
  - apps/cloudnative-pg.yaml
  - apps/garage.yaml
  - apps/persistent-storage.yaml
  - apps/traefik.yaml
  - apps/kube-prometheus-stack.yaml
  - apps/loki-stack.yaml
  - apps/hermes.yaml
  - apps/velero.yaml
  - apps/backup-replicator.yaml
  - apps/auto-remediator.yaml
  - apps/trivy-operator.yaml
  - apps/trivy-dashboard.yaml
  - apps/renovate-cronjob.yaml
  # 2. Core Frontend Services
  - apps/dashboard.yaml
  - apps/keycloak.yaml
  - apps/stalwart.yaml
  
  # Note: Optional apps (forgejo, immich, nextcloud, roundcube, excalidraw) 
  # are dynamically added to your private kustomization.yaml by prepare-community-repo.sh

