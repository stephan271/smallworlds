apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-garage-init
  namespace: nextcloud
spec:
  template:
    spec:
      serviceAccountName: nextcloud-setup-sa
      containers:
        - name: setup
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "Waiting for Garage pod to be ready..."
              until kubectl get pods -n garage-system -l app.kubernetes.io/name=garage -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null | grep -q 'true'; do
                echo "Garage is not ready yet, waiting..."
                sleep 5
              done

              echo "Finding Garage pod..."
              POD=$(kubectl get pods -n garage-system -l app.kubernetes.io/name=garage -o name | head -n 1)

              echo "Forming Garage Storage Layout..."
              NODES=$(kubectl exec -n garage-system $POD -- /garage status | grep -E '^[0-9a-f]{16}' | awk '{print $1}')
              for NODE in $NODES; do
                echo "Staging layout assignment for $NODE..."
                kubectl exec -n garage-system $POD -- /garage layout assign -z dc1 -c 100G $NODE || true
              done
              
              echo "Applying layout revision..."
              kubectl exec -n garage-system $POD -- /garage layout apply --version 1 || true

              # --- Nextcloud key & bucket ---
              if kubectl get secret garage-secret -n nextcloud > /dev/null 2>&1; then
                echo "garage-secret already exists in nextcloud namespace, skipping nextcloud key creation."
              else
                echo "Deleting existing Garage key if any (for idempotent re-runs)..."
                kubectl exec -n garage-system $POD -- /garage key delete nextcloud-key || true

                echo "Generating access key for Nextcloud..."
                OUTPUT=$(kubectl exec -n garage-system $POD -- /garage key create nextcloud-key)
                
                ACCESS_KEY=$(echo "$OUTPUT" | grep "Key ID:" | awk '{print $3}')
                SECRET_KEY=$(echo "$OUTPUT" | grep "Secret key:" | awk '{print $3}')

                if [[ -z "$ACCESS_KEY" || -z "$SECRET_KEY" ]]; then
                  echo "Error: Failed to parse Key ID or Secret key from output."
                  exit 1
                fi

                echo "Setting permissions for Nextcloud key..."
                kubectl exec -n garage-system $POD -- /garage key allow nextcloud-key --create-bucket || true

                echo "Creating nextcloud bucket..."
                kubectl exec -n garage-system $POD -- /garage bucket create nextcloud || true
                kubectl exec -n garage-system $POD -- /garage bucket allow nextcloud --read --write --owner --key nextcloud-key || true

                echo "Creating garage-secret in nextcloud namespace..."
                kubectl create secret generic garage-secret -n nextcloud \
                  --from-literal=accessKey="$ACCESS_KEY" \
                  --from-literal=secretKey="$SECRET_KEY" \
                  --from-literal=accessKeyId="$ACCESS_KEY" \
                  --from-literal=secretAccessKey="$SECRET_KEY"
              fi

              # --- Shared CNPG key for postgres-backups ---
              echo "Setting up shared postgres-backups key for CNPG..."
              kubectl exec -n garage-system $POD -- /garage key delete cnpg-backup-key || true
              CNPG_OUTPUT=$(kubectl exec -n garage-system $POD -- /garage key create cnpg-backup-key)
              CNPG_ACCESS=$(echo "$CNPG_OUTPUT" | grep "Key ID:" | awk '{print $3}')
              CNPG_SECRET=$(echo "$CNPG_OUTPUT" | grep "Secret key:" | awk '{print $3}')

              kubectl exec -n garage-system $POD -- /garage key allow cnpg-backup-key --create-bucket || true

              echo "Creating postgres-backups bucket..."
              kubectl exec -n garage-system $POD -- /garage bucket create postgres-backups || true
              kubectl exec -n garage-system $POD -- /garage bucket allow postgres-backups --read --write --owner --key cnpg-backup-key || true

              echo "Creating garage-secret (CNPG) in nextcloud namespace..."
              kubectl create secret generic garage-secret-cnpg -n nextcloud \
                --from-literal=accessKeyId="$CNPG_ACCESS" \
                --from-literal=secretAccessKey="$CNPG_SECRET" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Creating garage-secret (CNPG) in immich namespace..."
              kubectl create namespace immich || true
              kubectl create secret generic garage-secret -n immich \
                --from-literal=accessKeyId="$CNPG_ACCESS" \
                --from-literal=secretAccessKey="$CNPG_SECRET" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Creating garage-secret (CNPG) in keycloak namespace..."
              kubectl create namespace keycloak || true
              kubectl create secret generic garage-secret -n keycloak \
                --from-literal=accessKeyId="$CNPG_ACCESS" \
                --from-literal=secretAccessKey="$CNPG_SECRET" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Garage initialized successfully!"
      restartPolicy: OnFailure
