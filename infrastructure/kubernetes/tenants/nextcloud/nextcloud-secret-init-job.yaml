apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-secret-init
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: nextcloud-setup-sa
      containers:
        - name: secret-gen
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              if ! kubectl get secret nextcloud-admin-creds -n nextcloud >/dev/null 2>&1; then
                echo "Generating Nextcloud password..."
                PASSWORD=$(tr -dc A-Za-z0-9 </dev/urandom | head -c 32)
                ADMIN_EMAIL=$(kubectl get cm smallworlds-global-config -n default -o jsonpath='{.data.ADMIN_EMAIL}')
                
                kubectl create secret generic nextcloud-admin-creds -n nextcloud \
                  --from-literal=email="$ADMIN_EMAIL" \
                  --from-literal=password="$PASSWORD"
              else
                echo "nextcloud-admin-creds already exists, skipping."
              fi
      restartPolicy: OnFailure
