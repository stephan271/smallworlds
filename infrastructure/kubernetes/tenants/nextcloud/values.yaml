# First boot copies the ~700MB Nextcloud codebase into the volume and runs
# the installer before apache serves /status.php. Without a startupProbe the
# liveness probe (3x10s) kills the container mid-install, leaving a
# permanently half-installed state ("CAN_INSTALL missing" error page).
startupProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 60

internalDatabase:
  enabled: false
externalDatabase:
  enabled: true
  type: postgresql
  host: database-rw
  database: app
  existingSecret:
    enabled: true
    secretName: database-app
    usernameKey: username
    passwordKey: password

externalRedis:
  enabled: true
  host: redis
  
postgresql:
  enabled: false
redis:
  enabled: false
  
nextcloud:
  host: files.smallworlds.network
  # Admin credentials are auto-created from the secret provisioned by bootstrap.tf.
  # The installer runs non-interactively and skips the setup wizard entirely.
  existingSecret:
    enabled: true
    secretName: nextcloud-admin-creds
    usernameKey: nextcloud-username
    passwordKey: nextcloud-password
  # NOTE: no extraEnv for OBJECTSTORE_S3_KEY/SECRET — the chart injects them
  # via objectStore.s3.secretKeys below. Duplicate env names break kubectl's
  # strategic-merge patch and leave the app permanently OutOfSync.
  configs:
    # Includes NEXTCLOUD_TRUSTED_DOMAINS from the container env: config-dir
    # files OVERRIDE config.php per key, so a hardcoded array here would
    # discard both the image's install-time value and the oidc-config-job's
    # `occ config:system:set trusted_domains 3` — on a fresh install the
    # startup probe (Host: files.<domain>) then fails with 400 forever and
    # the wave-1 oidc job never runs (wave 0 never becomes healthy).
    trusted_domains.config.php: |-
      <?php
      $trusted = array('localhost', '127.0.0.1');
      if (isset($_SERVER['SERVER_ADDR'])) { $trusted[] = $_SERVER['SERVER_ADDR']; }
      $env = getenv('NEXTCLOUD_TRUSTED_DOMAINS');
      if ($env) {
        foreach (preg_split('/[\s,]+/', $env) as $d) {
          if ($d !== '') { $trusted[] = $d; }
        }
      }
      $CONFIG = array (
        'trusted_domains' => array_values(array_unique($trusted)),
      );
    proxy.config.php: |-
      <?php
      $CONFIG = array (
        'overwriteprotocol' => 'https',
        'trusted_proxies' => array('10.42.0.0/16', '10.43.0.0/16'),
      );
    disable_updates.config.php: |-
      <?php
      $CONFIG = array (
        'updatechecker' => false,
        'upgrade.disable-web' => true,
        'knowledgebaseenabled' => false,
      );
  # Object Storage (S3) configuration
  objectStore:
    s3:
      enabled: true
      host: garage.garage-system.svc.cluster.local
      port: 3900
      usePathStyle: true
      ssl: false
      region: garage
      bucket: nextcloud
      existingSecret: garage-secret
      secretKeys:
        accessKey: accessKey
        secretKey: secretKey
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Files"
    gethomepage.dev/description: "Nextcloud"
    gethomepage.dev/group: "Applications"
    gethomepage.dev/icon: "nextcloud.png"
  hosts:
    - host: files.smallworlds.network
      paths:
        - path: "/"
  tls:
    - secretName: nextcloud-tls
      hosts:
        - files.smallworlds.network
persistence:
  enabled: true
