apiVersion: v1
kind: ServiceAccount
metadata:
  name: nextcloud-oidc-config
  namespace: nextcloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nextcloud-oidc-config
  namespace: nextcloud
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nextcloud-oidc-config
  namespace: nextcloud
subjects:
  - kind: ServiceAccount
    name: nextcloud-oidc-config
    namespace: nextcloud
roleRef:
  kind: Role
  name: nextcloud-oidc-config
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-oidc-config
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      serviceAccountName: nextcloud-oidc-config
      containers:
        - name: configure-oidc
          image: bitnami/kubectl:1.30.2
          env:
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: client-secret
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: nextcloud-admin-creds
                  key: nextcloud-username
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Nextcloud pod to be ready..."
              while ! kubectl get pods -n nextcloud -l app.kubernetes.io/name=nextcloud -o jsonpath='{.items[0].status.phase}' 2>/dev/null | grep -q 'Running'; do
                sleep 5
              done
              
              # Get exact pod name (strip 'pod/')
              POD_NAME=$(kubectl get pods -n nextcloud -l app.kubernetes.io/name=nextcloud -o name | head -n 1 | cut -d/ -f2)
              
              echo "Waiting for Nextcloud to be fully installed and operational..."
              while ! kubectl exec -n nextcloud $POD_NAME -- su -s /bin/sh www-data -c "php occ status" 2>/dev/null | grep -q 'installed: true'; do
                echo "Nextcloud is not fully installed yet. Waiting 5s..."
                sleep 5
              done
              echo "Nextcloud is fully installed. Running OIDC configurations..."
              
              echo "Installing user_oidc app..."
              kubectl exec -n nextcloud $POD_NAME -- su -s /bin/sh www-data -c "php occ app:install user_oidc" || true
              
              echo "Configuring OIDC provider..."
              kubectl exec -n nextcloud $POD_NAME -- su -s /bin/sh www-data -c "php occ user_oidc:provider smallworlds --clientid=nextcloud --clientsecret=$CLIENT_SECRET --discoveryuri=https://identity.smallworlds.network/realms/smallworlds/.well-known/openid-configuration"
              
              echo "Disabling multiple backends to enforce OIDC auto-redirect..."
              kubectl exec -n nextcloud $POD_NAME -- su -s /bin/sh www-data -c "php occ config:app:set user_oidc allow_multiple_user_backends --value=0"

              echo "Setting admin email..."
              kubectl exec -n nextcloud $POD_NAME -- su -s /bin/sh www-data -c "php occ user:setting admin settings email '$ADMIN_EMAIL'" || true
              
              echo "Disabling announcement and update notification apps..."
              kubectl exec -n nextcloud $POD_NAME -- su -s /bin/sh www-data -c "php occ app:disable firstrunwizard" || true
              kubectl exec -n nextcloud $POD_NAME -- su -s /bin/sh www-data -c "php occ app:disable updatenotification" || true
              kubectl exec -n nextcloud $POD_NAME -- su -s /bin/sh www-data -c "php occ app:disable nextcloud_announcements" || true

              echo "Configuration complete."
      restartPolicy: OnFailure
