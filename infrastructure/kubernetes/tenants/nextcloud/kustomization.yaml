apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nextcloud

bases:
  - ../../bases/setup-rbac
  - ../../bases/redis
  - ../../bases/cnpg-cluster
  - ../../bases/garage-init-job
  - ../../bases/keycloak-client-job

resources:
  - oidc-config-job.yaml
  - nextcloud-secret-init-job.yaml

patches:
  - target:
      kind: Job
      name: keycloak-client-init
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: REDIRECT_URIS
            value: '["https://files.smallworlds.network/apps/user_oidc/code"]'

helmCharts:
  - name: nextcloud
    repo: https://nextcloud.github.io/helm/
    releaseName: nextcloud
    version: 9.0.2
    valuesFile: values.yaml
