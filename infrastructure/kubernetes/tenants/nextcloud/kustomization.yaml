apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nextcloud

bases:
  - ../../bases/setup-rbac
  - ../../bases/garage-init-job
  - ../../bases/keycloak-client-job
  - ../../bases/pv-backup-job

resources:
  - redis.yaml
  - cnpg-cluster.yaml
  - nextcloud-oidc-config-map.yaml
  - oidc-config-job.yaml
  - nextcloud-secret-init-job.yaml

patches:
  - target:
      kind: ClusterRoleBinding
      name: setup-binding
    patch: |-
      - op: replace
        path: /metadata/name
        value: setup-binding-nextcloud
  # Nightly copy of /var/www/html — user files are safe in the S3 primary
  # store, but config.php (instanceid, secret, passwordsalt) only lives on
  # this PVC and is required for a clean restore.
  - target:
      kind: CronJob
      name: pv-backup
    patch: |-
      - op: replace
        path: /spec/schedule
        value: "0 1 * * *"
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/volumes/0/persistentVolumeClaim/claimName
        value: nextcloud-nextcloud
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/env/0/value
        value: "nextcloud/pv-backup/html"
  - target:
      kind: Job
      name: keycloak-client-init
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: REDIRECT_URIS
            value: '["https://files.smallworlds.network/apps/user_oidc/code", "https://files.smallworlds.network/*"]'

helmCharts:
  - name: nextcloud
    repo: https://nextcloud.github.io/helm/
    releaseName: nextcloud
    version: 9.2.0
    valuesFile: values.yaml
