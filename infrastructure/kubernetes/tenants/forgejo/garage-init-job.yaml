apiVersion: batch/v1
kind: Job
metadata:
  name: forgejo-garage-init
  namespace: forgejo
spec:
  template:
    spec:
      serviceAccountName: forgejo-setup-sa
      containers:
        - name: setup
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "Waiting for Garage pod to be ready..."
              until kubectl get pods -n garage-system -l app.kubernetes.io/name=garage -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null | grep -q 'true'; do
                echo "Garage is not ready yet, waiting..."
                sleep 5
              done

              echo "Finding Garage pod..."
              POD=$(kubectl get pods -n garage-system -l app.kubernetes.io/name=garage -o name | head -n 1)

              # --- Forgejo key & bucket ---
              if kubectl get secret garage-secret -n forgejo > /dev/null 2>&1; then
                echo "garage-secret already exists in forgejo namespace, skipping key creation."
              else
                echo "Deleting existing Garage key if any..."
                kubectl exec -n garage-system $POD -- /garage key delete --yes forgejo-key || true

                echo "Generating access key for Forgejo..."
                OUTPUT=$(kubectl exec -n garage-system $POD -- /garage key create forgejo-key)
                
                ACCESS_KEY=$(echo "$OUTPUT" | grep "Key ID:" | awk '{print $3}')
                SECRET_KEY=$(echo "$OUTPUT" | grep "Secret key:" | awk '{print $3}')

                if [[ -z "$ACCESS_KEY" || -z "$SECRET_KEY" ]]; then
                  echo "Error: Failed to parse Key ID or Secret key."
                  exit 1
                fi

                echo "Setting permissions for Forgejo key..."
                kubectl exec -n garage-system $POD -- /garage key allow forgejo-key --create-bucket || true

                echo "Creating forgejo bucket..."
                kubectl exec -n garage-system $POD -- /garage bucket create forgejo || true
                kubectl exec -n garage-system $POD -- /garage bucket allow forgejo --read --write --owner --key forgejo-key || true

                echo "Creating garage-secret in forgejo namespace..."
                kubectl create secret generic garage-secret -n forgejo \
                  --from-literal=accessKey="$ACCESS_KEY" \
                  --from-literal=secretKey="$SECRET_KEY" \
                  --from-literal=accessKeyId="$ACCESS_KEY" \
                  --from-literal=secretAccessKey="$SECRET_KEY"
              fi

              # --- Dedicated CNPG key for forgejo ---
              echo "Setting up dedicated postgres-backups-forgejo key for CNPG..."
              kubectl exec -n garage-system $POD -- /garage key delete --yes forgejo-cnpg-key || true
              CNPG_OUTPUT=$(kubectl exec -n garage-system $POD -- /garage key create forgejo-cnpg-key)
              CNPG_ACCESS=$(echo "$CNPG_OUTPUT" | grep "Key ID:" | awk '{print $3}')
              CNPG_SECRET=$(echo "$CNPG_OUTPUT" | grep "Secret key:" | awk '{print $3}')

              kubectl exec -n garage-system $POD -- /garage key allow forgejo-cnpg-key --create-bucket || true

              echo "Creating postgres-backups-forgejo bucket..."
              kubectl exec -n garage-system $POD -- /garage bucket create postgres-backups-forgejo || true
              kubectl exec -n garage-system $POD -- /garage bucket allow postgres-backups-forgejo --read --write --owner --key forgejo-cnpg-key || true

              echo "Creating garage-secret-cnpg in forgejo namespace..."
              kubectl create secret generic garage-secret-cnpg -n forgejo \
                --from-literal=accessKeyId="$CNPG_ACCESS" \
                --from-literal=secretAccessKey="$CNPG_SECRET" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Forgejo Garage bucket initialized successfully!"
      restartPolicy: OnFailure
