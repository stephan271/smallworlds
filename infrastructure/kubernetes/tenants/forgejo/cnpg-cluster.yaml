# Deploy an isolated, highly-available PostgreSQL cluster specifically for Forgejo using the CloudNativePG Operator
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: forgejo-db
  namespace: forgejo
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  primaryUpdateStrategy: unsupervised
  storage:
    size: 20Gi
  bootstrap:
    initdb:
      database: forgejo
      owner: forgejo
  backup:
    retentionPolicy: "7d"
    barmanObjectStore:
      destinationPath: s3://postgres-backups/forgejo/
      endpointURL: http://garage.garage-system.svc.cluster.local:3900
      s3Credentials:
        accessKeyId:
          name: garage-secret
          key: accessKeyId
        secretAccessKey:
          name: garage-secret
          key: secretAccessKey
      wal:
        compression: gzip
---
# Daily scheduled backup at 02:00 UTC
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: forgejo-db-backup
  namespace: forgejo
spec:
  schedule: "0 2 * * *"
  cluster:
    name: forgejo-db
  immediate: true   # trigger one backup immediately on creation
  backupOwnerReference: self
