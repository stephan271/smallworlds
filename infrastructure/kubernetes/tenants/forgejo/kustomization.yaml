apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forgejo

bases:
  - ../../bases/setup-rbac
  - ../../bases/garage-init-job
  - ../../bases/keycloak-client-job

resources:
  - redis.yaml
  - cnpg-cluster.yaml
  - oidc-config-job.yaml
  - forgejo-secret-init-job.yaml

patches:
  - target:
      kind: ClusterRoleBinding
      name: setup-binding
    patch: |-
      - op: replace
        path: /metadata/name
        value: setup-binding-forgejo
  - target:
      kind: Job
      name: keycloak-client-init
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: REDIRECT_URIS
            value: '["https://git.smallworlds.network/user/oauth2/smallworlds/callback"]'

helmCharts:
  - name: forgejo
    repo: oci://codeberg.org/forgejo-contrib
    releaseName: forgejo
    version: 17.1.2
    valuesFile: values.yaml
