apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forgejo

bases:
  - ../../bases/setup-rbac
  - ../../bases/garage-init-job
  - ../../bases/keycloak-client-job
  - ../../bases/pv-backup-job

resources:
  - redis.yaml
  - cnpg-cluster.yaml
  - oidc-config-job.yaml
  - forgejo-secret-init-job.yaml

patches:
  - target:
      kind: ClusterRoleBinding
      name: setup-binding
    patch: |-
      - op: replace
        path: /metadata/name
        value: setup-binding-forgejo
  # Nightly copy of the git repositories (the S3 storage config only covers
  # LFS/attachments/avatars — bare repos live on this PVC). Staggered after
  # Immich's 00:30 run to be kind to the shared disk.
  - target:
      kind: CronJob
      name: pv-backup
    patch: |-
      - op: replace
        path: /spec/schedule
        value: "45 0 * * *"
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/volumes/0/persistentVolumeClaim/claimName
        value: gitea-shared-storage
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/env/0/value
        value: "forgejo/pv-backup/data"
  - target:
      kind: Job
      name: keycloak-client-init
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: REDIRECT_URIS
            value: '["https://git.smallworlds.network/user/oauth2/smallworlds/callback"]'

helmCharts:
  - name: forgejo
    repo: oci://codeberg.org/forgejo-contrib
    releaseName: forgejo
    version: 17.1.1
    valuesFile: values.yaml
