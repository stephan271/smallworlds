apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forgejo

resources:
  - cnpg-cluster.yaml
  - redis.yaml
  - oidc-config-job.yaml
  - garage-init-job.yaml
  - forgejo-secret-init-job.yaml
  - setup-rbac.yaml
  - keycloak-client-job.yaml

helmCharts:
  - name: forgejo
    repo: oci://code.forgejo.org/forgejo-helm
    releaseName: forgejo
    version: 10.1.0
    valuesFile: values.yaml
