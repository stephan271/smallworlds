apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-redis
  namespace: forgejo
  labels:
    app: forgejo-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-redis
  template:
    metadata:
      labels:
        app: forgejo-redis
    spec:
      containers:
        - name: redis
          image: docker.io/redis:6.2-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-redis
  namespace: forgejo
spec:
  selector:
    app: forgejo-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
