apiVersion: batch/v1
kind: Job
metadata:
  name: roundcube-keycloak-init
  namespace: roundcube
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: roundcube-setup-sa
      containers:
        - name: setup
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Starting Keycloak initialization..."

              echo "Finding Keycloak pod..."
              POD=keycloak-keycloakx-0

              echo "Waiting for Keycloak pod to be fully ready..."
              while ! kubectl get pods -n keycloak $POD -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null | grep -q 'true'; do
                echo "Keycloak is not ready yet, waiting..."
                sleep 5
              done
              echo "Keycloak is ready!"

              echo "Retrieving Keycloak admin password..."
              PASSWORD=$(kubectl get secret keycloak-admin-creds -n keycloak -o jsonpath="{.data.admin-password}" | base64 -d)

              echo "Authenticating into Keycloak..."
              kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh config credentials --server http://localhost:8080 --realm master --user admin --password "$PASSWORD"

              echo "Checking if roundcube client exists..."
              EXISTS=$(kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh get clients -r smallworlds -q clientId=roundcube)
              
              if [[ "$EXISTS" == "[]" || "$EXISTS" == "[ ]" || -z "$EXISTS" ]]; then
                echo "Creating roundcube client..."
                kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh create clients -r smallworlds -s clientId=roundcube -s enabled=true -s publicClient=false -s standardFlowEnabled=true -s 'redirectUris=["https://webmail.smallworlds.network/index.php/login/oauth"]' -s 'webOrigins=["https://webmail.smallworlds.network"]'
              else
                echo "Roundcube client already exists."
              fi

              echo "Extracting Client Secret..."
              SECRET=$(kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh get clients -r smallworlds -q clientId=roundcube --fields secret | grep "secret" | cut -d'"' -f4)

              if [[ -z "$SECRET" ]]; then
                echo "Error: Failed to retrieve OIDC Client Secret."
                exit 1
              fi

              echo "Applying roundcube-oauth-secret in roundcube namespace..."
              kubectl create secret generic roundcube-oauth-secret -n roundcube \
                --from-literal=OAUTH_CLIENT_SECRET="$SECRET" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Keycloak Client initialized successfully!"
      restartPolicy: OnFailure
