apiVersion: v1
kind: ConfigMap
metadata:
  name: roundcube-oauth-config
  namespace: roundcube
data:
  oauth-config.inc.php: |
    <?php
    $config['oauth_provider'] = 'generic';
    $config['oauth_provider_name'] = 'Keycloak';
    $config['oauth_client_id'] = 'roundcube';
    $config['oauth_client_secret'] = getenv('OAUTH_CLIENT_SECRET');
    $config['oauth_auth_uri'] = 'https://identity.smallworlds.network/realms/smallworlds/protocol/openid-connect/auth';
    $config['oauth_token_uri'] = 'https://identity.smallworlds.network/realms/smallworlds/protocol/openid-connect/token';
    $config['oauth_identity_uri'] = 'https://identity.smallworlds.network/realms/smallworlds/protocol/openid-connect/userinfo';
    $config['oauth_scope'] = 'openid email profile';
    $config['oauth_identity_fields'] = ['preferred_username'];
    $config['oauth_login_redirect'] = true;
    $config['use_https'] = true;
    $config['mail_domain'] = 'smallworlds.network';

    // Debugging configuration
    $config['log_driver'] = 'file';
    $config['debug_level'] = 1;
    $config['imap_debug'] = true;
    $config['oauth_debug'] = true;
    $config['smtp_debug'] = true;



    // Override mail server configuration to connect internally and bypass TLS validation / loopback issues
    $config['imap_host'] = 'ssl://stalwart-mail.stalwart.svc.cluster.local:993';
    $config['smtp_host'] = 'ssl://stalwart-mail.stalwart.svc.cluster.local:465';
    $config['imap_conn_options'] = [
        'ssl' => [
            'verify_peer' => false,
            'verify_peer_name' => false,
            'allow_self_signed' => true,
        ],
    ];
    $config['smtp_conn_options'] = [
        'ssl' => [
            'verify_peer' => false,
            'verify_peer_name' => false,
            'allow_self_signed' => true,
        ],
    ];

