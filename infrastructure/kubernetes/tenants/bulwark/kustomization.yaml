apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bulwark

bases:
  - ../../bases/setup-rbac
  - ../../bases/keycloak-client-job

resources:
  - bulwark-pvc.yaml
  - bulwark-deployment.yaml
  - bulwark-ingress.yaml
  - session-secret-job.yaml

patches:
  - target:
      kind: ClusterRoleBinding
      name: setup-binding
    patch: |-
      - op: replace
        path: /metadata/name
        value: setup-binding-bulwark
  - target:
      kind: Job
      name: keycloak-client-init
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: REDIRECT_URIS
            value: '["https://webmail.smallworlds.network/*"]'
          - name: OIDC_AUDIENCE_MAPPER
            value: "stalwart"
