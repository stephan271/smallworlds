apiVersion: apps/v1
kind: Deployment
metadata:
  name: bulwark
  namespace: bulwark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bulwark
  template:
    metadata:
      labels:
        app: bulwark
    spec:
      containers:
        - name: bulwark
          # v1.4.8 shipped a broken build (v1.4.7 UI with mismatched Next.js
          # server actions — the login page's auto-SSO action 404s and users
          # are stuck on "Sign in with SSO")
          # v1.5.0's composer had no sender-identity support at all (empty
          # From when composing); the From dropdown / identity handling
          # arrived in v1.7.x.
          image: ghcr.io/bulwarkmail/webmail:v1.7.7@sha256:8c93a6af6abf1b0e6595015dd8236ad83c4cbb2a1dce51966deaecb4d93ffeea
          ports:
            - containerPort: 3000
          env:
            - name: JMAP_SERVER_URL
              value: "https://mail.smallworlds.network"
            - name: OAUTH_ENABLED
              value: "true"
            - name: OAUTH_ONLY
              value: "true"
            # OAUTH_ONLY alone only hides the password form; the automatic
            # redirect into Keycloak is a separate switch (default false)
            - name: AUTO_SSO_ENABLED
              value: "true"
            - name: OAUTH_ISSUER_URL
              value: "https://identity.smallworlds.network/realms/smallworlds"
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: clientId
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: client-secret
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: session-secret
                  key: session-secret
            - name: APP_NAME
              value: "SmallWorlds Mail"
            - name: STALWART_FEATURES
              value: "true"
          volumeMounts:
            - name: bulwark-data
              mountPath: /app/data/admin
              subPath: admin
            - name: bulwark-data
              mountPath: /app/data/admin-state
              subPath: admin-state
      volumes:
        - name: bulwark-data
          persistentVolumeClaim:
            claimName: bulwark-data
---
apiVersion: v1
kind: Service
metadata:
  name: bulwark
  namespace: bulwark
spec:
  selector:
    app: bulwark
  ports:
    - name: http
      port: 80
      targetPort: 3000
