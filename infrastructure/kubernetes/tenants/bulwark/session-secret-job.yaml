apiVersion: batch/v1
kind: Job
metadata:
  name: session-secret-init
  namespace: bulwark
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: setup-sa
      containers:
        - name: generate-secret
          image: docker.io/alpine/k8s:1.36.2
          command:
            - /bin/bash
            - -c
            - |
              set -e
              NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)

              # Check if session-secret already exists
              if kubectl get secret session-secret -n $NAMESPACE >/dev/null 2>&1; then
                echo "session-secret already exists, skipping."
                exit 0
              fi

              echo "Generating session secret..."
              SESSION_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '\n')

              kubectl create secret generic session-secret -n $NAMESPACE \
                --from-literal=session-secret="$SESSION_SECRET"

              echo "Session secret created successfully!"
      restartPolicy: OnFailure
