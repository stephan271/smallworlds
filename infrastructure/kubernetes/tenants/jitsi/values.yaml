publicURL: "https://meet.smallworlds.network"

enableAuth: true
enableGuests: true

# Route moderator ("I am the host") login through the jitsi-oidc-adapter so that
# rooms can only be created by authenticated Keycloak users. Guests can still be
# invited and join once a moderator has opened the room (enableGuests: true).
#
# These env vars land in the shared configmap consumed by the web, prosody and
# jicofo containers. JWT_APP_SECRET is supplied separately to prosody from the
# jitsi-jwt secret (prosody.jwt.existingSecretName) and must match the adapter's
# APP_SECRET; JWT_APP_ID must match the adapter's APP_ID ("jitsi").
extraCommonEnvs:
  AUTH_TYPE: jwt
  JWT_APP_ID: jitsi
  JICOFO_ENABLE_AUTH: "false"
  TOKEN_AUTH_URL: "https://meet.smallworlds.network/oidc/auth?state={state}"
  XMPP_MODULES: persistent_lobby
  XMPP_MUC_MODULES: muc_wait_for_host

web:
  ingress:
    enabled: true
    hosts:
      - host: meet.smallworlds.network
        paths:
          - "/"
    tls:
      - hosts:
          - meet.smallworlds.network
        secretName: jitsi-tls
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Meet"
      gethomepage.dev/description: "Jitsi Meet"
      gethomepage.dev/group: "Applications"
      gethomepage.dev/icon: "jitsi.png"
      gethomepage.dev/pod-selector: "app.kubernetes.io/component=web"

  extraContainers:
    - name: jitsi-oidc-adapter
      image: ghcr.io/jitsi-contrib/jitsi-oidc-adapter:v20260328
      imagePullPolicy: IfNotPresent
      ports:
        - name: http
          containerPort: 9000
      env:
        - name: APP_ID
          value: jitsi
        - name: APP_SECRET
          valueFrom:
            secretKeyRef:
              name: jitsi-jwt
              key: JWT_APP_SECRET
        - name: OIDC_ISSUER
          value: "https://identity.smallworlds.network/realms/smallworlds"
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: keycloak-secret
              key: clientId
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: keycloak-secret
              key: client-secret
        - name: URL_BASE
          value: "https://meet.smallworlds.network"

  extraFiles:
    - path: /config/nginx-custom/oidc.conf
      content: |
        location ~ ^/oidc/ {
            proxy_pass http://127.0.0.1:9000;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Host $http_host;
        }

jvb:
  service:
    type: LoadBalancer

prosody:
  jwt:
    existingSecretName: jitsi-jwt
