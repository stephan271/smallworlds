apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jitsi

helmCharts:
  - name: jitsi-meet
    repo: https://jitsi-contrib.github.io/jitsi-helm/
    releaseName: jitsi
    version: 2.20.0
    valuesFile: values.yaml

bases:
  - ../../bases/setup-rbac
  - ../../bases/keycloak-client-job

resources:
  - jitsi-secret-init-job.yaml

patches:
  - target:
      kind: ClusterRoleBinding
      name: setup-binding
    patch: |-
      - op: replace
        path: /metadata/name
        value: setup-binding-jitsi
  - target:
      kind: Job
      name: keycloak-client-init
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: REDIRECT_URIS
            value: '["https://meet.smallworlds.network/*"]'
  # The OIDC auth env lives in the shared (common) ConfigMap, which is not
  # covered by the web/prosody/jicofo pod-template checksums, so a values
  # change alone does not roll the pods. Bump this annotation whenever the
  # shared auth config changes to force ArgoCD to restart them in-cluster
  # (we have no direct cluster API access to `kubectl rollout restart`).
  - target:
      kind: Deployment
      name: jitsi-jitsi-meet-web
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: jitsi-jitsi-meet-web
      spec:
        template:
          metadata:
            annotations:
              smallworlds.network/config-rev: "oidc-1"
  - target:
      kind: StatefulSet
      name: jitsi-jitsi-meet-prosody
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: jitsi-jitsi-meet-prosody
      spec:
        template:
          metadata:
            annotations:
              smallworlds.network/config-rev: "oidc-1"
  - target:
      kind: Deployment
      name: jitsi-jitsi-meet-jicofo
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: jitsi-jitsi-meet-jicofo
      spec:
        template:
          metadata:
            annotations:
              smallworlds.network/config-rev: "oidc-1"

