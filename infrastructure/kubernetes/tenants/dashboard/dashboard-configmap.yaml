apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-content
  namespace: dashboard
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Smallworlds Apps</title>
        <meta name="description" content="Your sovereign citizen cloud. Access all SmallWorlds applications and check system status.">
        <link rel="stylesheet" href="styles.css">
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="background-mesh"></div>

        <!-- Status banner: visible only during active incidents or upcoming maintenance -->
        <div id="status-banner" class="status-banner" hidden>
            <div class="status-banner-content">
                <span class="status-banner-indicator"></span>
                <span class="status-banner-text"></span>
                <button class="status-banner-dismiss" aria-label="Dismiss">&times;</button>
            </div>
        </div>

        <div class="container">
            <header>
                <h1>Smallworlds Apps</h1>
                <p>Welcome to your citizen cloud. Select an application to get started.</p>
            </header>

            <main class="app-grid">
                <!-- Nextcloud -->
                <a href="https://files.smallworlds.network" class="app-card" data-service-id="files" aria-label="Nextcloud Files">
                    <span class="status-dot" title="Checking..."></span>
                    <div class="app-icon nextcloud-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <h2>Files</h2>
                    <p>Nextcloud</p>
                </a>

                <!-- Immich -->
                <a href="https://photos.smallworlds.network" class="app-card" data-service-id="photos" aria-label="Immich Photos">
                    <span class="status-dot" title="Checking..."></span>
                    <div class="app-icon immich-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </div>
                    <h2>Photos</h2>
                    <p>Immich</p>
                </a>

                <!-- Forgejo -->
                <a href="https://git.smallworlds.network" class="app-card" data-service-id="git" aria-label="Forgejo Git">
                    <span class="status-dot" title="Checking..."></span>
                    <div class="app-icon forgejo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="6" y1="3" x2="6" y2="15"></line>
                            <circle cx="18" cy="6" r="3"></circle>
                            <circle cx="6" cy="18" r="3"></circle>
                            <path d="M18 9a9 9 0 0 1-9 9"></path>
                        </svg>
                    </div>
                    <h2>Git</h2>
                    <p>Forgejo</p>
                </a>



                <!-- Keycloak -->
                <a href="https://identity.smallworlds.network" class="app-card" data-service-id="auth" aria-label="Keycloak Auth">
                    <span class="status-dot" title="Checking..."></span>
                    <div class="app-icon keycloak-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
                        </svg>
                    </div>
                    <h2>Auth</h2>
                    <p>Keycloak</p>
                </a>
            </main>

            <!-- System Status Section -->
            <section id="status-section" class="status-section">
                <h2>System Status</h2>
                <div id="status-overview"></div>
                <div id="active-incidents"></div>
                <div id="planned-maintenance"></div>
                <div class="status-footer">
                    <span id="status-last-updated"></span>
                </div>
            </section>
        </div>

        <script>
        (function () {
            var STATUS_URL = '/api/status.json';
            var POLL_INTERVAL = 60000;

            var statusLabels = {
                operational: 'Operational',
                degraded: 'Degraded',
                outage: 'Outage',
                maintenance: 'Under Maintenance'
            };

            var severityLabels = { minor: 'Minor', major: 'Major', critical: 'Critical' };

            var incidentStatusLabels = {
                investigating: 'Investigating',
                identified: 'Identified',
                monitoring: 'Monitoring',
                resolved: 'Resolved'
            };

            function formatDate(s) {
                var d = new Date(s);
                return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
                       ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
            }

            function timeAgo(s) {
                var sec = Math.floor((Date.now() - new Date(s).getTime()) / 1000);
                if (sec < 60) return 'just now';
                var min = Math.floor(sec / 60);
                if (min < 60) return min + 'm ago';
                var hrs = Math.floor(min / 60);
                if (hrs < 24) return hrs + 'h ago';
                return Math.floor(hrs / 24) + 'd ago';
            }

            function esc(text) {
                var el = document.createElement('span');
                el.textContent = text;
                return el.innerHTML;
            }

            function updateDots(services) {
                services.forEach(function (svc) {
                    var card = document.querySelector('[data-service-id="' + svc.id + '"]');
                    if (!card) return;
                    var dot = card.querySelector('.status-dot');
                    if (!dot) return;
                    dot.className = 'status-dot status-' + svc.status;
                    dot.title = statusLabels[svc.status] || 'Unknown';
                });
            }

            function updateBanner(data) {
                var banner = document.getElementById('status-banner');
                if (!banner) return;

                var incident = null;
                for (var i = 0; i < data.incidents.length; i++) {
                    if (data.incidents[i].status !== 'resolved') { incident = data.incidents[i]; break; }
                }

                var maint = null;
                var now = Date.now();
                for (var j = 0; j < data.maintenance.length; j++) {
                    var ms = new Date(data.maintenance[j].scheduledStart).getTime() - now;
                    if (ms > 0 && ms < 86400000) { maint = data.maintenance[j]; break; }
                }

                if (!incident && !maint) { banner.hidden = true; return; }

                banner.hidden = false;
                var text = banner.querySelector('.status-banner-text');

                if (incident) {
                    text.textContent = incident.title;
                    banner.className = 'status-banner severity-' + incident.severity;
                } else {
                    text.textContent = 'Scheduled: ' + maint.title + ' \u2014 ' + formatDate(maint.scheduledStart);
                    banner.className = 'status-banner severity-info';
                }
            }

            function renderOverview(data) {
                var el = document.getElementById('status-overview');
                if (!el) return;
                var active = data.incidents.filter(function (i) { return i.status !== 'resolved'; });
                if (data.overall === 'operational' && active.length === 0) {
                    el.innerHTML = '<div class="all-operational"><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg><span>All systems operational</span></div>';
                } else {
                    el.innerHTML = '';
                }
            }

            function renderIncidents(incidents) {
                var el = document.getElementById('active-incidents');
                if (!el) return;
                var active = incidents.filter(function (i) { return i.status !== 'resolved'; });
                if (active.length === 0) { el.innerHTML = ''; return; }

                var h = '<h3>Active Incidents</h3>';
                active.forEach(function (inc) {
                    h += '<div class="incident-card">';
                    h += '<div class="incident-header">';
                    h += '<span class="severity-badge severity-' + esc(inc.severity) + '">' + esc(severityLabels[inc.severity] || inc.severity) + '</span>';
                    h += '<span class="incident-title">' + esc(inc.title) + '</span>';
                    h += '<span class="incident-status">' + esc(incidentStatusLabels[inc.status] || inc.status) + '</span>';
                    h += '</div>';
                    h += '<div class="incident-affected">Affected: ' + inc.affectedServices.map(esc).join(', ') + '</div>';
                    h += '<div class="incident-timeline">';
                    inc.updates.forEach(function (u) {
                        h += '<div class="timeline-entry"><div class="timeline-dot"></div><div class="timeline-content">';
                        h += '<div class="timeline-meta"><span class="timeline-time">' + esc(formatDate(u.timestamp)) + '</span>';
                        h += '<span class="timeline-badge">' + esc(incidentStatusLabels[u.status] || u.status) + '</span></div>';
                        h += '<p>' + esc(u.message) + '</p></div></div>';
                    });
                    h += '</div></div>';
                });
                el.innerHTML = h;
            }

            function renderMaintenance(maintenance) {
                var el = document.getElementById('planned-maintenance');
                if (!el) return;
                var now = Date.now();
                var upcoming = maintenance.filter(function (m) { return new Date(m.scheduledEnd).getTime() > now; });
                if (upcoming.length === 0) { el.innerHTML = ''; return; }

                var h = '<h3>Planned Maintenance</h3>';
                upcoming.forEach(function (m) {
                    h += '<div class="maintenance-card">';
                    h += '<div class="maintenance-header">';
                    h += '<svg class="maintenance-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>';
                    h += '<span class="maintenance-title">' + esc(m.title) + '</span>';
                    h += '</div>';
                    h += '<div class="maintenance-schedule">' + esc(formatDate(m.scheduledStart)) + ' \u2014 ' + esc(formatDate(m.scheduledEnd)) + '</div>';
                    h += '<div class="maintenance-affected">Affected: ' + m.affectedServices.map(esc).join(', ') + '</div>';
                    h += '<p class="maintenance-desc">' + esc(m.description) + '</p>';
                    h += '</div>';
                });
                el.innerHTML = h;
            }

            function updateTimestamp(ts) {
                var el = document.getElementById('status-last-updated');
                if (el) { el.textContent = 'Last checked: ' + timeAgo(ts); el.title = formatDate(ts); }
            }

            function fetchStatus() {
                fetch(STATUS_URL, { cache: 'no-store' })
                    .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
                    .then(function (data) {
                        updateDots(data.services);
                        updateBanner(data);
                        renderOverview(data);
                        renderIncidents(data.incidents);
                        renderMaintenance(data.maintenance);
                        updateTimestamp(data.lastUpdated);
                        document.getElementById('status-section').dataset.loaded = '1';
                    })
                    .catch(function () {
                        var ov = document.getElementById('status-overview');
                        if (ov && !document.getElementById('status-section').dataset.loaded) {
                            ov.innerHTML = '<div class="status-unavailable">Status information temporarily unavailable</div>';
                        }
                    });
            }

            fetchStatus();
            setInterval(fetchStatus, POLL_INTERVAL);

            document.addEventListener('click', function (e) {
                if (e.target.classList.contains('status-banner-dismiss')) {
                    e.target.closest('.status-banner').hidden = true;
                }
            });
        })();
        </script>
    </body>
    </html>
  styles.css: |
    :root {
        --bg-color: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --card-border: rgba(255, 255, 255, 0.1);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --hover-glow: rgba(56, 189, 248, 0.15);
        --accent-blue: #38bdf8;
        --accent-purple: #c084fc;
        --accent-green: #4ade80;
        --accent-orange: #fb923c;
        --accent-pink: #f472b6;
        --status-operational: #4ade80;
        --status-degraded: #fb923c;
        --status-outage: #ef4444;
        --status-maintenance: #38bdf8;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Outfit', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
    }

    /* Animated background mesh gradient */
    .background-mesh {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background-image:
            radial-gradient(at 10% 20%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
            radial-gradient(at 80% 10%, rgba(192, 132, 252, 0.15) 0px, transparent 50%),
            radial-gradient(at 40% 80%, rgba(74, 222, 128, 0.1) 0px, transparent 50%);
        animation: pulse 15s ease-in-out infinite alternate;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(1.05); opacity: 1; }
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 4rem 2rem;
    }

    header {
        text-align: center;
        margin-bottom: 4rem;
        animation: fadeInDown 0.8s ease-out;
    }

    header h1 {
        font-size: 3rem;
        font-weight: 700;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    header p {
        font-size: 1.2rem;
        color: var(--text-secondary);
        font-weight: 400;
    }

    /* Grid layout automatically adjusts cards based on screen size */
    .app-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 2rem;
        animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .app-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 2rem;
        text-align: center;
        text-decoration: none;
        color: var(--text-primary);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1;
    }

    .app-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at center, var(--hover-glow) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 0;
    }

    .app-card:hover {
        transform: translateY(-8px) scale(1.02);
        border-color: rgba(255, 255, 255, 0.2);
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.4);
    }

    .app-card:hover::before {
        opacity: 1;
    }

    .app-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 1.5rem;
        z-index: 1;
        transition: transform 0.3s ease;
    }

    .app-card:hover .app-icon {
        transform: scale(1.1);
    }

    .app-icon svg {
        width: 100%;
        height: 100%;
    }

    /* App-specific icon colors */
    .nextcloud-icon { color: var(--accent-blue); }
    .immich-icon { color: var(--accent-pink); }
    .forgejo-icon { color: var(--accent-orange); }
    .stalwart-icon { color: var(--accent-green); }
    .keycloak-icon { color: var(--accent-purple); }

    .app-card h2 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        z-index: 1;
    }

    .app-card p {
        font-size: 0.9rem;
        color: var(--text-secondary);
        z-index: 1;
    }

    /* ==========================================================================
       Status Dot on App Cards
       ========================================================================== */

    .status-dot {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: var(--text-secondary);
        z-index: 2;
        transition: background-color 0.4s ease, box-shadow 0.4s ease;
    }

    .status-dot.status-operational {
        background-color: var(--status-operational);
        box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
    }

    .status-dot.status-degraded {
        background-color: var(--status-degraded);
        box-shadow: 0 0 8px rgba(251, 146, 60, 0.6);
        animation: pulseDot 2s ease-in-out infinite;
    }

    .status-dot.status-outage {
        background-color: var(--status-outage);
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        animation: pulseDot 1.2s ease-in-out infinite;
    }

    .status-dot.status-maintenance {
        background-color: var(--status-maintenance);
        box-shadow: 0 0 8px rgba(56, 189, 248, 0.6);
    }

    @keyframes pulseDot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.85); }
    }

    /* ==========================================================================
       Status Banner (top of page, fixed)
       ========================================================================== */

    .status-banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 0.75rem 2rem;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        animation: slideDown 0.4s ease-out;
    }

    .severity-minor {
        background: rgba(251, 146, 60, 0.12);
        border-bottom: 1px solid rgba(251, 146, 60, 0.25);
    }
    .severity-major {
        background: rgba(239, 68, 68, 0.12);
        border-bottom: 1px solid rgba(239, 68, 68, 0.25);
    }
    .severity-critical {
        background: rgba(239, 68, 68, 0.2);
        border-bottom: 1px solid rgba(239, 68, 68, 0.4);
    }
    .severity-info {
        background: rgba(56, 189, 248, 0.12);
        border-bottom: 1px solid rgba(56, 189, 248, 0.25);
    }

    .status-banner-content {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .status-banner-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .severity-minor .status-banner-indicator { background: var(--status-degraded); }
    .severity-major .status-banner-indicator,
    .severity-critical .status-banner-indicator { background: var(--status-outage); }
    .severity-info .status-banner-indicator { background: var(--status-maintenance); }

    .severity-critical .status-banner-indicator {
        animation: pulseDot 1.2s ease-in-out infinite;
    }

    .status-banner-text {
        flex: 1;
        font-size: 0.95rem;
        font-weight: 500;
    }

    .status-banner-dismiss {
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 1.5rem;
        line-height: 1;
        padding: 0 0.25rem;
        transition: color 0.2s ease;
    }

    .status-banner-dismiss:hover {
        color: var(--text-primary);
    }

    @keyframes slideDown {
        from { transform: translateY(-100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    /* ==========================================================================
       Status Section (below app grid)
       ========================================================================== */

    .status-section {
        margin-top: 4rem;
        animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .status-section h2 {
        font-size: 1.8rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        color: var(--text-primary);
    }

    .status-section h3 {
        font-size: 1.2rem;
        font-weight: 600;
        margin: 2rem 0 1rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    /* All Operational */
    .all-operational {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1.25rem 1.5rem;
        background: rgba(74, 222, 128, 0.06);
        border: 1px solid rgba(74, 222, 128, 0.18);
        border-radius: 14px;
        font-size: 1.1rem;
        font-weight: 500;
        color: var(--accent-green);
    }

    .check-icon {
        width: 22px;
        height: 22px;
        flex-shrink: 0;
    }

    /* Status Unavailable */
    .status-unavailable {
        padding: 1.25rem 1.5rem;
        background: rgba(148, 163, 184, 0.06);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 14px;
        color: var(--text-secondary);
        font-style: italic;
    }

    /* Incident Card */
    .incident-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }

    .incident-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
        flex-wrap: wrap;
    }

    .incident-title {
        font-weight: 600;
        font-size: 1.05rem;
        flex: 1;
        min-width: 0;
    }

    .incident-status {
        font-size: 0.8rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 500;
    }

    .severity-badge {
        font-size: 0.7rem;
        font-weight: 600;
        padding: 0.2rem 0.55rem;
        border-radius: 6px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        flex-shrink: 0;
    }

    .severity-badge.severity-minor {
        background: rgba(251, 146, 60, 0.15);
        color: var(--accent-orange);
    }
    .severity-badge.severity-major {
        background: rgba(239, 68, 68, 0.15);
        color: var(--status-outage);
    }
    .severity-badge.severity-critical {
        background: rgba(239, 68, 68, 0.25);
        color: var(--status-outage);
    }

    .incident-affected {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 1rem;
    }

    /* Incident Timeline */
    .incident-timeline {
        padding-left: 1.25rem;
        border-left: 2px solid rgba(255, 255, 255, 0.08);
        margin-left: 0.25rem;
    }

    .timeline-entry {
        position: relative;
        padding-bottom: 1.25rem;
    }

    .timeline-entry:last-child {
        padding-bottom: 0;
    }

    .timeline-dot {
        position: absolute;
        left: calc(-1.25rem - 5px);
        top: 0.45rem;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent-blue);
        box-shadow: 0 0 6px rgba(56, 189, 248, 0.4);
    }

    .timeline-meta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.25rem;
    }

    .timeline-time {
        font-size: 0.8rem;
        color: var(--text-secondary);
    }

    .timeline-badge {
        font-size: 0.7rem;
        color: var(--accent-blue);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
    }

    .timeline-content p {
        font-size: 0.9rem;
        color: var(--text-primary);
        line-height: 1.6;
        margin: 0;
    }

    /* Maintenance Card */
    .maintenance-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }

    .maintenance-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
    }

    .maintenance-icon {
        width: 20px;
        height: 20px;
        color: var(--status-maintenance);
        flex-shrink: 0;
    }

    .maintenance-title {
        font-weight: 600;
        font-size: 1.05rem;
    }

    .maintenance-schedule {
        font-size: 0.9rem;
        color: var(--accent-blue);
        font-weight: 500;
        margin-bottom: 0.35rem;
    }

    .maintenance-affected {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 0.5rem;
    }

    .maintenance-desc {
        font-size: 0.9rem;
        color: var(--text-secondary);
        line-height: 1.6;
        margin: 0;
    }

    /* Status Footer */
    .status-footer {
        margin-top: 1.5rem;
        text-align: right;
    }

    #status-last-updated {
        font-size: 0.8rem;
        color: var(--text-secondary);
        opacity: 0.7;
    }

    /* ==========================================================================
       Animations
       ========================================================================== */

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* ==========================================================================
       Responsive
       ========================================================================== */

    @media (max-width: 600px) {
        .container {
            padding: 2rem 1rem;
        }

        header h1 {
            font-size: 2.2rem;
        }

        .app-grid {
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .app-card {
            padding: 1.5rem;
        }

        .app-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
        }

        .app-card h2 {
            font-size: 1.2rem;
        }

        .status-section h2 {
            font-size: 1.4rem;
        }

        .incident-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 0.4rem;
        }

        .status-banner {
            padding: 0.75rem 1rem;
        }

        .status-banner-text {
            font-size: 0.85rem;
        }
    }
