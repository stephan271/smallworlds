apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: plane

bases:
  - ../../bases/setup-rbac
  # Creates the `plane` bucket + garage-secret AND garage-secret-cnpg. The
  # latter was always referenced by cnpg-cluster.yaml but this base was
  # missing, so CNPG backups had no credentials to authenticate with.
  - ../../bases/garage-init-job

resources:
  - redis.yaml
  - cnpg-cluster.yaml
  - admin-nginx-configmap.yaml
  - doc-store-init-job.yaml

helmCharts:
  - name: plane-ce
    repo: https://helm.plane.so/
    releaseName: plane
    version: 1.6.0
    valuesFile: values.yaml

patches:
  # Fresh-install deadlock fix: the migrate Job below is a wave-1 Sync hook,
  # but ArgoCD only starts wave 1 once wave 0 is fully healthy — and the api
  # Deployment (wave 0 by default) never becomes ready before migrations have
  # run, so on a virgin database the sync stalled forever. Pushing the api
  # Deployment to wave 2 makes the order: everything else (0) -> migrate
  # hook (1) -> api (2). Existing clusters are unaffected (api is already
  # healthy there and wave gating passes straight through).
  - target:
      kind: Deployment
      name: plane-api-wl
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plane-api-wl
        annotations:
          argocd.argoproj.io/sync-wave: "2"
  - target:
      kind: ClusterRoleBinding
      name: setup-binding
    patch: |-
      - op: replace
        path: /metadata/name
        value: setup-binding-plane
  - target:
      kind: Ingress
      name: plane-ingress
    patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: plane-ingress
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Plane"
          gethomepage.dev/description: "Project Management"
          gethomepage.dev/group: "Applications"
          gethomepage.dev/icon: "plane.png"
  - target:
      kind: Deployment
      name: plane-api-wl
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plane-api-wl
      spec:
        template:
          spec:
            containers:
              - name: plane-api
                env:
                  - name: PGHOST
                    value: "database-rw"
                  - name: PGDATABASE
                    value: "app"
                  - name: PGUSER
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: username
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: password
                  - name: DATABASE_URL
                    value: "postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):5432/$(PGDATABASE)"
                  - name: AMQP_URL
                    value: "amqp://plane:plane@plane-rabbitmq.plane.svc.cluster.local/"
  - target:
      kind: Deployment
      name: plane-worker-wl
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plane-worker-wl
      spec:
        template:
          spec:
            containers:
              - name: plane-worker
                env:
                  - name: PGHOST
                    value: "database-rw"
                  - name: PGDATABASE
                    value: "app"
                  - name: PGUSER
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: username
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: password
                  - name: DATABASE_URL
                    value: "postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):5432/$(PGDATABASE)"
                  - name: AMQP_URL
                    value: "amqp://plane:plane@plane-rabbitmq.plane.svc.cluster.local/"
  - target:
      kind: Deployment
      name: plane-beat-worker-wl
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plane-beat-worker-wl
      spec:
        template:
          spec:
            containers:
              - name: plane-beat-worker
                env:
                  - name: PGHOST
                    value: "database-rw"
                  - name: PGDATABASE
                    value: "app"
                  - name: PGUSER
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: username
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: password
                  - name: DATABASE_URL
                    value: "postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):5432/$(PGDATABASE)"
                  - name: AMQP_URL
                    value: "amqp://plane:plane@plane-rabbitmq.plane.svc.cluster.local/"
  - target:
      kind: ConfigMap
      name: plane-app-vars
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: plane-app-vars
      data:
        WEB_URL: "https://plan.smallworlds.network"
  - target:
      kind: Deployment
      name: plane-admin-wl
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plane-admin-wl
      spec:
        template:
          spec:
            containers:
              - name: plane-admin
                volumeMounts:
                  - name: nginx-conf
                    mountPath: /etc/nginx/nginx.conf
                    subPath: nginx.conf
            volumes:
              - name: nginx-conf
                configMap:
                  name: plane-admin-nginx-conf
  - target:
      kind: Job
      name: plane-api-migrate-1
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: plane-api-migrate-1
        annotations:
          argocd.argoproj.io/hook: Sync
          argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
          argocd.argoproj.io/sync-wave: "1"
      spec:
        template:
          spec:
            containers:
              - name: plane-api-migrate
                env:
                  - name: PGHOST
                    value: "database-rw"
                  - name: PGDATABASE
                    value: "app"
                  - name: PGUSER
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: username
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: password
                  - name: DATABASE_URL
                    value: "postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):5432/$(PGDATABASE)"
  - target:
      kind: Ingress
      name: plane-ingress
    patch: |-
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - plan.smallworlds.network
            secretName: plane-tls
      - op: replace
        path: /spec/ingressClassName
        value: traefik
