apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: plane

bases:
  - ../../bases/setup-rbac
  - ../../bases/keycloak-client-job

resources:
  - redis.yaml
  - cnpg-cluster.yaml
  - admin-nginx-configmap.yaml

helmCharts:
  - name: plane-ce
    repo: https://helm.plane.so/
    releaseName: plane
    version: 1.6.0
    valuesFile: values.yaml

patches:
  - target:
      kind: ClusterRoleBinding
      name: setup-binding
    patch: |-
      - op: replace
        path: /metadata/name
        value: setup-binding-plane
  - target:
      kind: Job
      name: keycloak-client-init
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: REDIRECT_URIS
            value: '["https://plan.smallworlds.network/auth/oidc/callback", "https://plan.smallworlds.network/*"]'
  - target:
      kind: Ingress
      name: plane-ingress
    patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: plane-ingress
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Plane"
          gethomepage.dev/description: "Project Management"
          gethomepage.dev/group: "Applications"
          gethomepage.dev/icon: "plane.png"
  - target:
      kind: Deployment
      name: plane-api-wl
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plane-api-wl
      spec:
        template:
          spec:
            containers:
              - name: plane-api
                env:
                  - name: ENABLE_OIDC
                    value: "1"
                  - name: OPENID_ISSUER
                    value: "https://identity.smallworlds.network/realms/smallworlds"
                  - name: OPENID_CLIENT_ID
                    valueFrom:
                      secretKeyRef:
                        name: keycloak-secret
                        key: clientId
                  - name: OPENID_CLIENT_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: keycloak-secret
                        key: client-secret
                  - name: PGHOST
                    value: "database-rw"
                  - name: PGDATABASE
                    value: "app"
                  - name: PGUSER
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: username
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: password
                  - name: DATABASE_URL
                    value: "postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):5432/$(PGDATABASE)"
                  - name: AMQP_URL
                    value: "amqp://plane:plane@plane-rabbitmq.plane.svc.cluster.local/"
  - target:
      kind: Deployment
      name: plane-worker-wl
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plane-worker-wl
      spec:
        template:
          spec:
            containers:
              - name: plane-worker
                env:
                  - name: ENABLE_OIDC
                    value: "1"
                  - name: OPENID_ISSUER
                    value: "https://identity.smallworlds.network/realms/smallworlds"
                  - name: OPENID_CLIENT_ID
                    valueFrom:
                      secretKeyRef:
                        name: keycloak-secret
                        key: clientId
                  - name: OPENID_CLIENT_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: keycloak-secret
                        key: client-secret
                  - name: PGHOST
                    value: "database-rw"
                  - name: PGDATABASE
                    value: "app"
                  - name: PGUSER
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: username
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: password
                  - name: DATABASE_URL
                    value: "postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):5432/$(PGDATABASE)"
                  - name: AMQP_URL
                    value: "amqp://plane:plane@plane-rabbitmq.plane.svc.cluster.local/"
  - target:
      kind: Deployment
      name: plane-beat-worker-wl
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plane-beat-worker-wl
      spec:
        template:
          spec:
            containers:
              - name: plane-beat-worker
                env:
                  - name: ENABLE_OIDC
                    value: "1"
                  - name: OPENID_ISSUER
                    value: "https://identity.smallworlds.network/realms/smallworlds"
                  - name: OPENID_CLIENT_ID
                    valueFrom:
                      secretKeyRef:
                        name: keycloak-secret
                        key: clientId
                  - name: OPENID_CLIENT_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: keycloak-secret
                        key: client-secret
                  - name: PGHOST
                    value: "database-rw"
                  - name: PGDATABASE
                    value: "app"
                  - name: PGUSER
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: username
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: password
                  - name: DATABASE_URL
                    value: "postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):5432/$(PGDATABASE)"
                  - name: AMQP_URL
                    value: "amqp://plane:plane@plane-rabbitmq.plane.svc.cluster.local/"
  - target:
      kind: ConfigMap
      name: plane-app-vars
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: plane-app-vars
      data:
        WEB_URL: "https://plan.smallworlds.network"
  - target:
      kind: Deployment
      name: plane-admin-wl
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plane-admin-wl
      spec:
        template:
          spec:
            containers:
              - name: plane-admin
                volumeMounts:
                  - name: nginx-conf
                    mountPath: /etc/nginx/nginx.conf
                    subPath: nginx.conf
            volumes:
              - name: nginx-conf
                configMap:
                  name: plane-admin-nginx-conf
  - target:
      kind: Job
      name: plane-api-migrate-1
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: plane-api-migrate-1
        annotations:
          argocd.argoproj.io/hook: Sync
          argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
          # The API waits for migrations before becoming Ready, so migrations
          # must share wave 0 rather than wait for API health in wave 1.
          argocd.argoproj.io/sync-wave: "0"
      spec:
        template:
          spec:
            containers:
              - name: plane-api-migrate
                env:
                  - name: PGHOST
                    value: "database-rw"
                  - name: PGDATABASE
                    value: "app"
                  - name: PGUSER
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: username
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: database-app
                        key: password
                  - name: DATABASE_URL
                    value: "postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):5432/$(PGDATABASE)"
  - target:
      kind: Ingress
      name: plane-ingress
    patch: |-
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - plan.smallworlds.network
            secretName: plane-tls
      - op: replace
        path: /spec/ingressClassName
        value: traefik
