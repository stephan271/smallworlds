apiVersion: v1
kind: ConfigMap
metadata:
  name: plane-admin-nginx-conf
data:
  nginx.conf: |
    worker_processes 4;

    events {
      worker_connections 1024;
    }

    http {
      include mime.types;

      default_type  application/octet-stream;

      set_real_ip_from        0.0.0.0/0;
      real_ip_recursive       on;
      real_ip_header          X-Forward-For;
      limit_req_zone          $binary_remote_addr zone=mylimit:10m rate=10r/s;

      access_log /dev/stdout;
      error_log /dev/stderr;

      # We're behind Traefik terminating TLS on 443 and proxying plain HTTP
      # to this container's port 3000. Without this, nginx's automatic
      # directory trailing-slash redirect (for a bare "/god-mode" request)
      # builds an absolute Location from its own scheme/port, producing
      # "http://<host>:3000/god-mode/" instead of the public HTTPS URL.
      absolute_redirect off;

      server {
        listen 3000;

        location / {
          root   /usr/share/nginx/html;
          index  index.html index.htm;
          try_files $uri $uri/ /god-mode/index.html;
        }
      }
    }
