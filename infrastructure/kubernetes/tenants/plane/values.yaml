postgres:
  local_setup: false
redis:
  local_setup: false
minio:
  local_setup: false
rabbitmq:
  local_setup: false

ingress:
  enabled: true
  appHost: "plan.smallworlds.network"
  ingressClass: "nginx"
  ingress_annotations: {}

ssl:
  tls_secret_name: "plane-tls"

env:
  remote_redis_url: "redis://redis:6379/0"

# We are using Kustomize patches in kustomization.yaml to inject our custom
# OIDC and Postgres environment variables securely into all Deployments.
