apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-notification-channels
  namespace: hermes
data:
  channels.yaml: |
    email:
      enabled: true
      smtp_host: "stalwart-smtp.stalwart.svc.cluster.local"
      smtp_port: 2525
      from_address: "hermes@smallworlds.network"
      # admin_email will be fetched from global config map
    status_page:
      enabled: true
      configmap_name: "status-data"
      namespace: "dashboard"
      key: "status.json"
    matrix:
      enabled: false

  templates.yaml: |
    incident-opened:
      subject: "⚠️ [Incident] {service} is experiencing issues"
      body: |
        Service: {service}
        Severity: {severity}
        
        We have detected an issue and Hermes is investigating the root cause.
        Updates will be posted to the status page.
    
    incident-resolved:
      subject: "✅ [Resolved] {service} is back to normal"
      body: |
        Service: {service}
        
        The issue has been resolved.
        Root cause summary: {summary}
    
    maintenance-scheduled:
      subject: "🔧 Scheduled Maintenance: {date}"
      body: |
        Maintenance has been scheduled.
        Date: {date}
        Description: {description}
        Affected Services: {services}
    
    approval-required:
      subject: "🔒 Approval Required: {action}"
      body: |
        Hermes has proposed a critical change that requires human approval.
        
        App: {app}
        Action: {action}
        Delta: {delta}
        Cost Impact: {cost}
        
        Please review and merge the PR here: {pr_link}
