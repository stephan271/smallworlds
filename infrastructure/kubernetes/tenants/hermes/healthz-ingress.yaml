apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthz
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthz
  template:
    metadata:
      labels:
        app: healthz
    spec:
      containers:
      - name: healthz
        image: hashicorp/http-echo:1.0.0
        args:
        - "-text=OK"
        - "-listen=:8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: healthz
  namespace: hermes
spec:
  selector:
    app: healthz
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthz
  namespace: hermes
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
  - hosts:
    - status.smallworlds.network
    secretName: status-tls
  rules:
  - host: status.smallworlds.network
    http:
      paths:
      - path: /healthz
        pathType: Prefix
        backend:
          service:
            name: healthz
            port:
              number: 80
