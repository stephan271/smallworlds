apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-agent
  namespace: hermes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hermes-agent-role
rules:
  # Least privilege: the agent's only Kubernetes tools are get_pod_status and
  # get_recent_events, so it needs read on pods and events and nothing else.
  # (Metrics/logs come over HTTP from Prometheus/Loki — not the k8s API.) An LLM
  # that ingests untrusted log/metric content must not be able to read Secrets.
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hermes-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hermes-agent-role
subjects:
  - kind: ServiceAccount
    name: hermes-agent
    namespace: hermes
