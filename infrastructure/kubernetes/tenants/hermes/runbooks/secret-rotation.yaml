name: Secret Rotation Workflow
description: Automates the rotation of critical cluster credentials and API keys
schedule: "0 2 1 * *" # 2 AM on the 1st of every month
tasks:
  - id: rotate-cnpg
    description: "Rotate CloudNativePG superuser and app passwords"
    action: "kubectl-patch"
    target:
      kind: Cluster
      apiVersion: postgresql.cnpg.io/v1
    payload: |
      # This triggers the CNPG operator to rotate the password by modifying an annotation
      metadata:
        annotations:
          cnpg.io/rotate-credentials: "{{ timestamp }}"
  
  - id: rotate-keycloak
    description: "Rotate Keycloak shared OAuth secret"
    action: "script"
    script: |
      # Randomly generate new secret
      NEW_SECRET=$(openssl rand -hex 32)
      
      # Patch the secret
      kubectl patch secret keycloak-secret -n keycloak -p="{\"stringData\":{\"client-secret\":\"$NEW_SECRET\"}}"
      
      # Restart pods depending on this secret
      kubectl rollout restart deployment nextcloud -n nextcloud
      kubectl rollout restart deployment immich-server -n immich
      kubectl rollout restart deployment dashboard -n dashboard

  - id: rotate-garage
    description: "Rotate Garage S3 access keys"
    action: "script"
    script: |
      # Call Garage admin API to issue new keypair
      # Wait for propagation, then update S3 secrets in velero and nextcloud namespaces
      # Finally revoke the old keypair
      echo "Garage key rotation requires manual approval via PR for the secret manifests."
      exit 1 # Forces Hermes to generate a PR instead of auto-applying
