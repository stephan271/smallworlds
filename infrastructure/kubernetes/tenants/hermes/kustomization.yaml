apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - hermes-rbac.yaml
  - hermes-config.yaml
  - hermes-deployment.yaml
  - hermes-service.yaml

configMapGenerator:
  # The agent source, mounted at /app. Flat package (no subdirs), so a single
  # ConfigMap suffices — ConfigMap keys can't contain "/".
  - name: hermes-src
    namespace: hermes
    files:
      - src/config.py
      - src/prometheus.py
      - src/loki.py
      - src/k8s.py
      - src/mailer.py
      - src/tools.py
      - src/agent.py
      - src/main.py
  - name: hermes-system-prompt
    namespace: hermes
    files:
      - system-prompt.txt
