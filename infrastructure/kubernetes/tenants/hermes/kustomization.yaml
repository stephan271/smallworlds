apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - hermes-rbac.yaml
  - hermes-config.yaml
  - hermes-sa-secret.yaml
  - hermes-deployment.yaml
  - notification-channels.yaml

configMapGenerator:
  - name: hermes-system-prompt
    namespace: hermes
    files:
      - system-prompt.txt
  - name: hermes-runbooks
    namespace: hermes
    files:
      - runbooks/secret-rotation.yaml
      - runbooks/resource-pressure.yaml
      - runbooks/resource-rightsizing.yaml
      - runbooks/vertical-scaling.yaml
      - runbooks/storage-expansion.yaml
