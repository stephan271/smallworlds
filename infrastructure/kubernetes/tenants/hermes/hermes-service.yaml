apiVersion: v1
kind: Service
metadata:
  name: hermes-agent
  namespace: hermes
  labels:
    app: hermes-agent
spec:
  selector:
    app: hermes-agent
  ports:
    # Tier 1 escalates to http://hermes-agent.hermes.svc.cluster.local:8080/webhook
    - name: webhook
      port: 8080
      targetPort: webhook
