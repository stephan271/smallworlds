apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-garage-init
  namespace: keycloak
  annotations:
    # Run as a sync hook (recreated each sync) — a plain Job drifts OutOfSync
    # as soon as its spec changes in git, because completed Jobs are immutable
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  # Generous limit: at cluster bootstrap this job races garage's first start;
  # a Failed job is never retried by ArgoCD, deadlocking the wave-0 keycloak app
  backoffLimit: 20
  template:
    spec:
      serviceAccountName: keycloak-setup-sa
      containers:
        - name: setup
          image: docker.io/alpine/k8s:1.36.2
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "Waiting for Garage pod to be ready..."
              until kubectl get pods -n garage-system -l app.kubernetes.io/name=garage -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null | grep -q 'true'; do
                echo "Garage is not ready yet, waiting..."
                sleep 5
              done

              echo "Finding Garage pod..."
              POD=$(kubectl get pods -n garage-system -l app.kubernetes.io/name=garage -o name | head -n 1)

              # Keycloak deploys at sync-wave 0, before the tenants whose init
              # jobs normally form the layout — form it here too (idempotent)
              # or key/bucket commands fail with "Layout not ready"
              echo "Forming Garage Storage Layout..."
              NODES=$(kubectl exec -n garage-system $POD -- /garage status | grep -E '^[0-9a-f]{16}' | awk '{print $1}')
              for NODE in $NODES; do
                kubectl exec -n garage-system $POD -- /garage layout assign -z dc1 -c 100G $NODE || true
              done
              kubectl exec -n garage-system $POD -- /garage layout apply --version 1 || true

              if kubectl get secret garage-secret -n keycloak >/dev/null 2>&1; then
                echo "garage-secret already exists in keycloak namespace, nothing to do."
                exit 0
              fi

              echo "Setting up postgres-backups-keycloak key for CNPG..."
              kubectl exec -n garage-system $POD -- /garage key delete --yes keycloak-backup-key || true
              CNPG_OUTPUT=$(kubectl exec -n garage-system $POD -- /garage key create keycloak-backup-key)
              CNPG_ACCESS=$(echo "$CNPG_OUTPUT" | grep "Key ID:" | awk '{print $3}')
              CNPG_SECRET=$(echo "$CNPG_OUTPUT" | grep "Secret key:" | awk '{print $3}')

              kubectl exec -n garage-system $POD -- /garage key allow keycloak-backup-key --create-bucket || true

              echo "Creating postgres-backups-keycloak bucket..."
              kubectl exec -n garage-system $POD -- /garage bucket create postgres-backups-keycloak || true
              kubectl exec -n garage-system $POD -- /garage bucket allow postgres-backups-keycloak --read --write --owner --key keycloak-backup-key || true

              echo "Creating garage-secret in keycloak namespace..."
              kubectl create secret generic garage-secret -n keycloak \
                --from-literal=accessKeyId="$CNPG_ACCESS" \
                --from-literal=secretAccessKey="$CNPG_SECRET" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Garage initialized successfully for Keycloak!"
      restartPolicy: OnFailure
