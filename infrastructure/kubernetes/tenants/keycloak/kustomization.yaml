apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keycloak

resources:
  - cnpg-cluster.yaml
  - keycloak-redirect.yaml
  - realm-config-job.yaml
  - setup-rbac.yaml
  - garage-init-job.yaml

configMapGenerator:
  - name: keycloak-realm-config
    files:
      - smallworlds-realm.json

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: ClusterRoleBinding
      name: setup-binding
    patch: |-
      - op: replace
        path: /metadata/name
        value: setup-binding-keycloak

helmCharts:
  - name: keycloakx
    repo: https://codecentric.github.io/helm-charts
    releaseName: keycloak
    version: 7.2.0
    valuesFile: values.yaml
