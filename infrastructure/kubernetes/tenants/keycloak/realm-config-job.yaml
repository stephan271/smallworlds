apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-realm-config
  namespace: keycloak
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    metadata:
      labels:
        app: keycloak-realm-config
    spec:
      containers:
        - name: kcadm
          image: quay.io/keycloak/keycloak:24.0.4
          env:
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-creds
                  key: admin-password
            - name: BULK_INVITE_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-creds
                  key: bulk-invite-secret
            - name: ONBOARDING_MODE
              value: "invitation"
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Keycloak to be ready..."
              until /opt/keycloak/bin/kcadm.sh config credentials --server http://keycloak-keycloakx-http:80 --realm master --user admin --password "$KEYCLOAK_ADMIN_PASSWORD" > /dev/null 2>&1; do
                echo "Keycloak is not ready, waiting..."
                sleep 3
              done
              
              echo "Importing smallworlds realm..."
              /opt/keycloak/bin/kcadm.sh create realms -f /opt/keycloak/data/import/smallworlds-realm.json || echo "Realm may already exist."

              echo "Setting onboarding mode to $ONBOARDING_MODE..."
              if [ "$ONBOARDING_MODE" = "self-registration" ]; then
                /opt/keycloak/bin/kcadm.sh update realms/smallworlds -s registrationAllowed=true -s verifyEmail=true
              else
                /opt/keycloak/bin/kcadm.sh update realms/smallworlds -s registrationAllowed=false
              fi

              echo "Creating bulk-invite service account client..."
              /opt/keycloak/bin/kcadm.sh create clients -r smallworlds -s clientId=bulk-invite -s serviceAccountsEnabled=true -s publicClient=false -s secret="$BULK_INVITE_SECRET" || echo "Client may already exist."
              
              echo "Assigning realm-admin role to bulk-invite..."
              /opt/keycloak/bin/kcadm.sh add-roles -r smallworlds --uusername service-account-bulk-invite --cclientid realm-management --rolename realm-admin || echo "Role may already be assigned."

              echo "Realm configuration complete."
          volumeMounts:
            - name: realm-config
              mountPath: "/opt/keycloak/data/import/smallworlds-realm.json"
              subPath: "smallworlds-realm.json"
              readOnly: true
      restartPolicy: OnFailure
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
  backoffLimit: 10
