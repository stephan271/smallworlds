apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: immich

resources:
  - cnpg-cluster.yaml
  - library-pvc.yaml
  - redis.yaml
  - setup-rbac.yaml
  - garage-init-job.yaml
  - keycloak-client-job.yaml
  - admin-init-job.yaml
  - immich-secret-init-job.yaml

helmCharts:
  - name: immich
    repo: https://immich-app.github.io/immich-charts
    releaseName: immich
    version: 0.10.3
    valuesFile: values.yaml
