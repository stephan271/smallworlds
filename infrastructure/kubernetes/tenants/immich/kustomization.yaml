apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: immich

bases:
  - ../../bases/setup-rbac
  - ../../bases/garage-init-job
  - ../../bases/keycloak-client-job
  - ../../bases/pv-backup-job

resources:
  - redis.yaml
  - cnpg-cluster.yaml
  - admin-config.yaml
  - admin-init-job.yaml
  - immich-secret-init-job.yaml
  - library-pvc.yaml
  - immich-catalog.yaml

patches:
  - target:
      kind: ClusterRoleBinding
      name: setup-binding
    patch: |-
      - op: replace
        path: /metadata/name
        value: setup-binding-immich
  # Nightly copy of the photo/video originals into the tenant bucket, where the
  # backup-replicator picks them up for the offsite leg (the library PV is
  # otherwise the only copy of the community's photos).
  - target:
      kind: CronJob
      name: pv-backup
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/volumes/0/persistentVolumeClaim/claimName
        value: immich-library-pvc
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/env/0/value
        value: "immich/pv-backup/library"
  - target:
      kind: Job
      name: keycloak-client-init
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: REDIRECT_URIS
            value: '["https://photos.smallworlds.network/auth/login", "https://photos.smallworlds.network/user-settings", "app.immich:///"]'
  - target:
      kind: Cluster
      name: database
    patch: |-
      - op: remove
        path: /spec/imageName
      - op: add
        path: /spec/imageCatalogRef
        value:
          apiGroup: postgresql.cnpg.io
          kind: ClusterImageCatalog
          name: immich-catalog
          major: 16
      # postInitApplicationSQL, not postInitSQL: the extensions must exist in
      # the app database Immich connects to, not the postgres maintenance DB
      - op: add
        path: /spec/bootstrap/initdb/postInitApplicationSQL
        value:
          - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
          - CREATE EXTENSION IF NOT EXISTS cube;
          - CREATE EXTENSION IF NOT EXISTS earthdistance;
      - op: add
        path: /spec/postgresql
        value:
          shared_preload_libraries:
            - "vchord.so"

helmCharts:
  - name: immich
    # The HTTP helm repo was removed with chart 0.13; OCI only
    repo: oci://ghcr.io/immich-app/immich-charts
    releaseName: immich
    version: 0.13.1
    valuesFile: values.yaml
