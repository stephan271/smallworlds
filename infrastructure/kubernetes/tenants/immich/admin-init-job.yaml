apiVersion: batch/v1
kind: Job
metadata:
  name: immich-admin-init
  namespace: immich
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: admin-init
          image: python:3.13-alpine
          env:
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: immich-admin-creds
                  key: email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-admin-creds
                  key: password
            - name: ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: immich-admin-creds
                  key: name
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: client-secret
            - name: ISSUER_URL
              valueFrom:
                configMapKeyRef:
                  name: immich-admin-config
                  key: ISSUER_URL
          command:
            - python3
            - -c
            - |
              import json, os, sys, time, urllib.error, urllib.request

              BASE = "http://immich-server.immich.svc.cluster.local:2283"

              def req(method, path, body=None, token=None):
                  data = json.dumps(body).encode() if body is not None else None
                  r = urllib.request.Request(BASE + path, data=data, method=method)
                  r.add_header("Content-Type", "application/json")
                  if token:
                      r.add_header("Authorization", "Bearer " + token)
                  try:
                      with urllib.request.urlopen(r, timeout=30) as resp:
                          return resp.status, json.loads(resp.read() or b"null")
                  except urllib.error.HTTPError as e:
                      return e.code, json.loads(e.read() or b"null")

              print("Waiting for Immich server to be ready...", flush=True)
              while True:
                  try:
                      if req("GET", "/api/server/ping")[0] == 200:
                          break
                  except Exception:
                      pass
                  print("  not ready yet, retrying in 10s...", flush=True)
                  time.sleep(10)

              email = os.environ["ADMIN_EMAIL"]
              password = os.environ["ADMIN_PASSWORD"]

              print(f"Creating Immich admin account for: {email}", flush=True)
              status, body = req("POST", "/api/auth/admin-sign-up",
                                 {"email": email, "password": password,
                                  "name": os.environ["ADMIN_NAME"]})
              if status in (200, 201):
                  print("Admin account created.")
              elif status == 400:
                  print("Admin account already exists.")
              else:
                  sys.exit(f"Failed to create admin account: HTTP {status}: {body}")

              status, body = req("POST", "/api/auth/login",
                                 {"email": email, "password": password})
              if status not in (200, 201) or not body.get("accessToken"):
                  sys.exit(f"Admin login failed: HTTP {status}")
              token = body["accessToken"]

              print("Configuring OIDC...", flush=True)
              status, cfg = req("GET", "/api/system-config", token=token)
              if status != 200:
                  sys.exit(f"Failed to fetch system config: HTTP {status}")

              cfg["oauth"].update({
                  "enabled": True,
                  "clientId": "immich",
                  "clientSecret": os.environ["OAUTH_CLIENT_SECRET"],
                  "issuerUrl": os.environ["ISSUER_URL"],
                  "autoRegister": True,
                  "autoLaunch": True,
                  "buttonText": "Login with SmallWorlds ID",
              })

              status, body = req("PUT", "/api/system-config", cfg, token=token)
              if status != 200:
                  sys.exit(f"Failed to update system config: HTTP {status}: {body}")
              print("OIDC configured successfully!")
