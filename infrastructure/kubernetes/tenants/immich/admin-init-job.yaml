apiVersion: batch/v1
kind: Job
metadata:
  name: immich-admin-init
  namespace: immich
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: admin-init
          image: curlimages/curl:latest
          env:
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: immich-admin-creds
                  key: email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-admin-creds
                  key: password
            - name: ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: immich-admin-creds
                  key: name
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: client-secret
          command:
            - /bin/sh
            - -c
            - |
              IMMICH_URL="http://immich-server.immich.svc.cluster.local:3001"

              echo "Waiting for Immich server to be ready..."
              until curl -sf "$IMMICH_URL/api/server-info/ping" > /dev/null 2>&1; do
                echo "  not ready yet, retrying in 10s..."
                sleep 10
              done
              echo "Immich is up."

              echo "Creating Immich admin account for: $ADMIN_EMAIL"
              RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$IMMICH_URL/api/auth/admin-sign-up" \
                -H "Content-Type: application/json" \
                -d "{
                  \"email\": \"$ADMIN_EMAIL\",
                  \"password\": \"$ADMIN_PASSWORD\",
                  \"name\": \"$ADMIN_NAME\"
                }")

              HTTP_STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
              BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')

              if [ "$HTTP_STATUS" = "400" ]; then
                echo "Admin account already exists (HTTP 400). Proceeding to config."
              elif [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
                echo "Admin account created successfully. Proceeding to config."
              else
                echo "Failed to create admin account. HTTP $HTTP_STATUS"
                echo "Response: $BODY"
                exit 1
              fi

              echo "Logging in as admin to configure OIDC..."
              TOKEN=$(curl -s -X POST "$IMMICH_URL/api/auth/login" \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}" | grep -o '"accessToken":"[^"]*' | cut -d'"' -f4)

              if [ -z "$TOKEN" ]; then
                echo "Failed to get admin access token!"
                exit 1
              fi

              echo "Configuring OIDC via API..."
              curl -s -H "Authorization: Bearer $TOKEN" "$IMMICH_URL/api/system-config" > /tmp/cfg.json
              sed "s/\"clientSecret\":\"\"/\"clientSecret\":\"$OAUTH_CLIENT_SECRET\"/" /tmp/cfg.json | \
              sed "s/\"clientId\":\"\"/\"clientId\":\"immich\"/" | \
              sed "s|\"issuerUrl\":\"\"|\"issuerUrl\":\"https://identity.smallworlds.network/realms/smallworlds\"|" | \
              sed "s/\"enabled\":false/\"enabled\":true/" | \
              sed "s/\"autoRegister\":false/\"autoRegister\":true/" | \
              sed "s/\"autoLaunch\":false/\"autoLaunch\":true/" > /tmp/new_cfg.json
              
              # Also ensure buttonText is set correctly
              sed -i "s/\"buttonText\":\"[^\"]*\"/\"buttonText\":\"Login with SmallWorlds ID\"/" /tmp/new_cfg.json

              curl -s -X PUT "$IMMICH_URL/api/system-config" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d @/tmp/new_cfg.json
              
              echo "OIDC configured successfully!"
              exit 0
