apiVersion: v1
kind: Secret
metadata:
  name: garage-secret
  namespace: immich
type: Opaque
# These are placeholder values. You will need to replace them with your actual Garage access/secret keys once generated by the `garage key new` command.
# Use `echo -n "YOUR_KEY" | base64` to get the base64 encoded values.
data:
  # Base64 encoded 's3-access-key'
  accessKeyId: cMMyLWFjY2Vzcy1rZXk=
  # Base64 encoded 's3-secret-access-key'
  secretAccessKey: c2VjcmV0QWNjZXNzS2V5
