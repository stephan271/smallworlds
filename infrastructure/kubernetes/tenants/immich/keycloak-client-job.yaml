apiVersion: batch/v1
kind: Job
metadata:
  name: immich-keycloak-init
  namespace: immich
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: immich-setup-sa
      containers:
        - name: setup
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Starting Keycloak initialization..."

              echo "Finding Keycloak pod..."
              POD=keycloak-keycloakx-0

              echo "Waiting for Keycloak pod to be fully ready..."
              while ! kubectl get pods -n keycloak $POD -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null | grep -q 'true'; do
                echo "Keycloak is not ready yet, waiting..."
                sleep 5
              done
              echo "Keycloak is ready!"

              echo "Retrieving Keycloak admin password..."
              PASSWORD=$(kubectl get secret keycloak-admin-creds -n keycloak -o jsonpath="{.data.admin-password}" | base64 -d)

              echo "Authenticating into Keycloak..."
              kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh config credentials --server http://localhost:8080 --realm master --user admin --password "$PASSWORD"

              echo "Checking if immich client exists..."
              EXISTS=$(kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh get clients -r smallworlds -q clientId=immich)
              
              if [[ "$EXISTS" == "[]" || "$EXISTS" == "[ ]" || -z "$EXISTS" ]]; then
                echo "Creating immich client..."
                kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh create clients -r smallworlds -s clientId=immich -s enabled=true -s publicClient=false -s standardFlowEnabled=true -s 'redirectUris=["app.immich:///*","https://photos.smallworlds.network/auth/login","https://photos.smallworlds.network/user-settings","https://photos.smallworlds.network/*"]' -s 'webOrigins=["+"]'
              else
                echo "Immich client already exists."
              fi

              echo "Extracting Client Secret..."
              SECRET=$(kubectl exec -n keycloak -i $POD -- /opt/keycloak/bin/kcadm.sh get clients -r smallworlds -q clientId=immich --fields secret | grep "secret" | cut -d'"' -f4)

              if [[ -z "$SECRET" ]]; then
                echo "Error: Failed to retrieve OIDC Client Secret."
                exit 1
              fi

              echo "Applying keycloak-secret in immich namespace..."
              kubectl create secret generic keycloak-secret -n immich \
                --from-literal=client-secret="$SECRET" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Keycloak Client initialized successfully!"
      restartPolicy: OnFailure
