apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
  namespace: stalwart
data:
  config.json: |
    {
      "@type": "PostgreSql",
      "host": "stalwart-db-rw.stalwart.svc.cluster.local",
      "database": "stalwart",
      "port": 5432,
      "authUsername": "stalwart",
      "authSecret": {
        "@type": "EnvironmentVariable",
        "variableName": "DB_PASSWORD"
      },
      "useTls": false,
      "allowInvalidCerts": false,
      "timeout": 15000,
      "poolMaxConnections": 10
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart-mail
  namespace: stalwart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stalwart-mail
  template:
    metadata:
      labels:
        app: stalwart-mail
    spec:
      containers:
        - name: stalwart
          image: stalwartlabs/stalwart:latest
          ports:
            - containerPort: 25
              name: smtp
            - containerPort: 587
              name: submission
            - containerPort: 143
              name: imap
            - containerPort: 993
              name: imaps
            - containerPort: 8080
              name: jmap
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-db-app
                  key: password
            - name: STALWART_RECOVERY_ADMIN
              valueFrom:
                secretKeyRef:
                  name: stalwart-admin-secret
                  key: recovery-admin
                  optional: true
            - name: DOMAIN
              valueFrom:
                secretKeyRef:
                  name: stalwart-dns-secrets
                  key: domain
                  optional: true
            - name: STALWART_SERVER_HOSTNAME
              value: "mail.$(DOMAIN)"
            - name: STALWART_MTA_OUTBOUND_STRATEGY_DEFAULT_EHLO
              value: "mail.$(DOMAIN)"
            - name: STALWART_SESSION_RCPT_RELAY_0
              value: "127.0.0.1/8"
            - name: STALWART_SESSION_RCPT_RELAY_1
              value: "::1"
            - name: STALWART_SESSION_RCPT_RELAY_2
              value: "10.42.0.0/16"
            - name: STALWART_SESSION_RCPT_RELAY_3
              value: "10.43.0.0/16"
            - name: STALWART_CERTIFICATE_DEFAULT_CERT
              value: "file:///etc/stalwart/tls/tls.crt"
            - name: STALWART_CERTIFICATE_DEFAULT_PRIVATE_KEY
              value: "file:///etc/stalwart/tls/tls.key"
            - name: STALWART_SERVER_LISTENER_SUBMISSION_BIND
              value: "[::]:587"
            - name: STALWART_SERVER_LISTENER_SUBMISSION_PROTOCOL
              value: "smtp"
            - name: STALWART_SERVER_LISTENER_SUBMISSION_TLS_IMPLICIT
              value: "false"
          volumeMounts:
            - name: config
              mountPath: /etc/stalwart/config.json
              subPath: config.json
            - name: tls
              mountPath: /etc/stalwart/tls
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: stalwart-config
        - name: tls
          secret:
            secretName: stalwart-tls

---
apiVersion: v1
kind: Service
metadata:
  name: stalwart-mail
  namespace: stalwart
spec:
  type: LoadBalancer
  selector:
    app: stalwart-mail
  ports:
    - name: smtp
      port: 25
      targetPort: 25
    - name: submission
      port: 587
      targetPort: 587
    - name: imaps
      port: 993
      targetPort: 993
    - name: jmap
      port: 8080
      targetPort: 8080
