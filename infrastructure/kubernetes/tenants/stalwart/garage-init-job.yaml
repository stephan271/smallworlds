apiVersion: batch/v1
kind: Job
metadata:
  name: stalwart-garage-init
  namespace: stalwart
spec:
  template:
    spec:
      serviceAccountName: stalwart-setup-sa
      containers:
        - name: setup
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "Waiting for Garage pod to be ready..."
              until kubectl get pods -n garage-system -l app.kubernetes.io/name=garage -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null | grep -q 'true'; do
                echo "Garage is not ready yet, waiting..."
                sleep 5
              done

              echo "Finding Garage pod..."
              POD=$(kubectl get pods -n garage-system -l app.kubernetes.io/name=garage -o name | head -n 1)

              echo "Setting up postgres-backups-stalwart key for CNPG..."
              kubectl exec -n garage-system $POD -- /garage key delete --yes stalwart-backup-key || true
              CNPG_OUTPUT=$(kubectl exec -n garage-system $POD -- /garage key create stalwart-backup-key)
              CNPG_ACCESS=$(echo "$CNPG_OUTPUT" | grep "Key ID:" | awk '{print $3}')
              CNPG_SECRET=$(echo "$CNPG_OUTPUT" | grep "Secret key:" | awk '{print $3}')

              kubectl exec -n garage-system $POD -- /garage key allow stalwart-backup-key --create-bucket || true

              echo "Creating postgres-backups-stalwart bucket..."
              kubectl exec -n garage-system $POD -- /garage bucket create postgres-backups-stalwart || true
              kubectl exec -n garage-system $POD -- /garage bucket allow postgres-backups-stalwart --read --write --owner --key stalwart-backup-key || true

              echo "Creating garage-secret in stalwart namespace..."
              kubectl create secret generic garage-secret -n stalwart \
                --from-literal=accessKeyId="$CNPG_ACCESS" \
                --from-literal=secretAccessKey="$CNPG_SECRET" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Garage initialized successfully for Stalwart!"
      restartPolicy: OnFailure
