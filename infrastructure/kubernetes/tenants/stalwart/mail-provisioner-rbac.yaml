apiVersion: v1
kind: ServiceAccount
metadata:
  name: mail-provisioner
  namespace: stalwart
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mail-provisioner-keycloak-secret-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["keycloak-db-app"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mail-provisioner-keycloak-secret-reader
subjects:
  - kind: ServiceAccount
    name: mail-provisioner
    namespace: stalwart
roleRef:
  kind: ClusterRole
  name: mail-provisioner-keycloak-secret-reader
  apiGroup: rbac.authorization.k8s.io
