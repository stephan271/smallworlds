apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: stalwart

bases:
  - ../../bases/setup-rbac
  - ../../bases/cnpg-cluster
  - ../../bases/garage-init-job

resources:
  - stalwart-deployment.yaml
  - stalwart-init-job.yaml
  - mail-provisioner-deployment.yaml
  - stalwart-ingress.yaml
  - stalwart-secret-init-job.yaml

patches:
  - target:
      kind: ClusterRoleBinding
      name: setup-binding
    patch: |-
      - op: replace
        path: /metadata/name
        value: setup-binding-stalwart
