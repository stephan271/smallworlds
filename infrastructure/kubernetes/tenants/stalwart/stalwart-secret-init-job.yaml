apiVersion: batch/v1
kind: Job
metadata:
  name: stalwart-secret-init
  namespace: stalwart
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: stalwart-setup-sa
      containers:
        - name: secret-gen
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              if ! kubectl get secret stalwart-admin-secret -n stalwart >/dev/null 2>&1; then
                echo "Generating Stalwart password..."
                PASSWORD=$(tr -dc A-Za-z0-9 </dev/urandom | head -c 32)
                
                kubectl create secret generic stalwart-admin-secret -n stalwart \
                  --from-literal=password="$PASSWORD"
                  
                # Also create the secret in the keycloak namespace for SMTP
                kubectl create secret generic keycloak-stalwart-secret -n keycloak \
                  --from-literal=password="$PASSWORD" || true
                  
                # Trigger a rolling restart of Keycloak so it picks up the new SMTP password
                kubectl rollout restart statefulset/keycloak -n keycloak || true
              else
                echo "stalwart-admin-secret already exists, skipping."
              fi
      restartPolicy: OnFailure
